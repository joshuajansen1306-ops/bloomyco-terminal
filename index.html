<!DOCTYPE html>
<html lang="en">
<head>
<link rel="preconnect" href="https://esm.sh" crossorigin />
<link rel="dns-prefetch" href="https://esm.sh" />
<link rel="preconnect" href="https://api.coingecko.com" crossorigin />
<link rel="dns-prefetch" href="https://api.coingecko.com" />
<meta charset="UTF-8" />
<title>Bloomyco.in</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<style>
  :root {
    --bg: #000000;
    --panel: #0a0a0a;
    --border: #2a2a2a;
    --amber: #ff9900;
    --green: #00ff66;
    --red: #ff3b3b;
    --cyan: #00e5ff;
    --text: #d8d8d8;
    --dim: #6b6b6b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); overflow-x: hidden; }
  body {
    font-family: "IBM Plex Mono", "Consolas", "Courier New", monospace;
    color: var(--text);
    font-size: 13px;
    line-height: 1.4;
  }
  #root { min-height: 100vh; }

  .terminal {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
    max-width: 100vw;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--amber);
    color: #000;
    padding: 4px 10px;
    font-weight: 700;
    letter-spacing: 1px;
    font-size: 12px;
  }
  .topbar .clock { font-weight: 700; }
  .topbar-brand {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .topbar-brand:hover { opacity: 0.75; transform: translateY(-1px); }
  .topbar-brand:active { transform: translateY(0); opacity: 0.6; }
  .site-logo { height: 22px; width: auto; display: block; }
  .topbar-btn {
    background: rgba(0,0,0,0.08);
    border: 1px solid rgba(0,0,0,0.55);
    color: #000;
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 4px 10px;
    cursor: pointer;
    white-space: nowrap;
    border-radius: 2px;
    transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }
  .topbar-btn:hover {
    background: rgba(0,0,0,0.22);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.55);
    transform: translateY(-1px);
  }
  .topbar-btn:active { transform: translateY(0); background: rgba(0,0,0,0.32); }

  .cmdbar {
    display: flex;
    gap: 6px;
    align-items: center;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 6px 10px;
  }
  .cmdbar input {
    flex: 1;
    background: #000;
    border: 1px solid var(--border);
    color: var(--green);
    font-family: inherit;
    font-size: 13px;
    padding: 4px 8px;
    outline: none;
  }
  .cmdbar input::placeholder { color: var(--dim); }
  .cmdbar .label { color: var(--amber); font-weight: 700; }

  .body {
    flex: 1;
    display: grid;
    grid-template-columns: 1.2fr 1fr 280px;
    grid-template-rows: auto 1fr;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  .panel {
    background: var(--panel);
    padding: 8px 10px;
    overflow: auto;
  }
  .panel h2 {
    margin: 0 0 8px 0;
    font-size: 12px;
    color: var(--amber);
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .tab {
    cursor: pointer;
    padding: 4px 12px;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--dim);
    border: 1px solid var(--border);
  }
  .tab.active {
    color: #000;
    background: var(--amber);
    border-color: var(--amber);
    font-weight: 700;
  }

  .indices-bar {
    display: flex;
    gap: 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 5px 10px;
    overflow-x: auto;
    white-space: nowrap;
  }
  .idx-item { font-size: 11px; }
  .idx-item .idx-label { color: var(--dim); margin-right: 6px; }

  .index-blocks {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .index-card {
    border: 1px solid var(--border);
    background: #0e0d08;
    padding: 8px 10px;
    cursor: pointer;
  }
  .index-card.active {
    border-color: var(--amber);
    background: #1a1608;
  }
  .index-card .ic-label {
    color: var(--amber);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .index-card .ic-price {
    font-size: 18px;
    font-weight: 700;
    margin-top: 4px;
  }
  .index-card .ic-chg {
    font-size: 11px;
    margin-top: 2px;
  }
  .india-section-label {
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 1px;
    margin: 4px 0 6px;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar .panel { flex: 1; min-height: 0; }

  .news-list { display: flex; flex-direction: column; gap: 8px; }
  .news-item {
    display: block;
    text-decoration: none;
    padding: 6px 0;
    border-bottom: 1px solid #161616;
  }
  .news-item:hover .news-title { color: var(--amber); }
  .news-title { color: var(--text); font-size: 12px; line-height: 1.35; }
  .news-meta { color: var(--dim); font-size: 10px; margin-top: 3px; letter-spacing: 0.3px; }

  .heatmap-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }
  .heat-cell {
    padding: 8px 6px;
    font-size: 10px;
    color: #000;
    font-weight: 700;
  }
  .heat-cell .hc-name { display: block; font-size: 9px; opacity: 0.85; }
  .heat-cell .hc-chg { display: block; font-size: 12px; margin-top: 2px; }

  .pf-form {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
  }
  .pf-form select, .pf-form input {
    background: #000;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    padding: 3px 5px;
  }
  .pf-form select { flex: 1.4; }
  .pf-form input { flex: 1; min-width: 0; }
  .pf-form button {
    background: var(--amber);
    color: #000;
    border: none;
    font-weight: 700;
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
  }
  .pf-list { font-size: 11px; }
  .pf-list .pf-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #161616; align-items: center; }
  .pf-list .pf-rm { color: var(--dim); cursor: pointer; margin-left: 6px; }
  .pf-total { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 12px; }

  .acct-summary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .acct-cell .k { color: var(--dim); font-size: 9px; text-transform: uppercase; }
  .acct-cell .v { font-size: 13px; font-weight: 700; margin-top: 2px; }

  .trade-form { margin-bottom: 10px; }
  .trade-asset { font-size: 11px; margin-bottom: 6px; color: var(--dim); }
  .trade-kind-tabs { display: flex; gap: 2px; margin-bottom: 6px; }
  .trade-row {
    display: flex;
    gap: 4px;
    margin-bottom: 6px;
  }
  .trade-row select, .trade-row input {
    background: #000;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    padding: 3px 5px;
    flex: 1;
    min-width: 0;
  }
  .trade-row button {
    background: var(--amber);
    color: #000;
    border: none;
    font-weight: 700;
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
    flex: 1.2;
  }
  .trade-row button.trade-sell-btn { background: var(--red); color: #fff; }
  .trade-error { color: var(--red); font-size: 10px; margin-top: 4px; }

  .pos-row { padding: 6px 0; border-bottom: 1px solid #161616; font-size: 11px; }
  .pos-row-bottom { display: flex; justify-content: flex-end; align-items: center; margin-top: 3px; }
  .pos-kind {
    font-size: 9px;
    font-weight: 700;
    color: #000;
    background: var(--dim);
    padding: 1px 4px;
  }

  .ticker-tape {
    grid-column: 1 / -1;
    background: var(--panel);
    white-space: nowrap;
    overflow: hidden;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .ticker-track {
    display: inline-block;
    animation: scroll 30s linear infinite;
  }
  .ticker-item { display: inline-block; padding: 0 24px; font-size: 13px; }
  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    color: var(--dim);
    font-weight: 400;
    font-size: 11px;
    text-transform: uppercase;
    padding: 4px 6px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 5px 6px;
    border-bottom: 1px solid #161616;
    font-size: 13px;
  }
  tr:hover td { background: #141414; cursor: pointer; }
  tr.selected td { background: #1a1a1a; }

  .up { color: var(--green); }
  .down { color: var(--red); }
  .mono-num { font-variant-numeric: tabular-nums; }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 14px;
    margin-bottom: 14px;
  }
  .detail-grid .k { color: var(--dim); font-size: 11px; text-transform: uppercase; }
  .detail-grid .v { font-size: 14px; }

  .chart-wrap { margin-top: 10px; }
  .chart-wrap svg { width: 100%; height: 220px; display: block; }

  @keyframes flashUp   { 0% { background: rgba(0,255,102,0.45); } 100% { background: transparent; } }
  @keyframes flashDown { 0% { background: rgba(255,59,59,0.45); } 100% { background: transparent; } }
  .flash-up   { animation: flashUp 0.9s ease-out; }
  .flash-down { animation: flashDown 0.9s ease-out; }

  .chart-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 4px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chart-controls-group {
    display: flex;
    gap: 2px;
  }
  .chart-toggle {
    cursor: pointer;
    padding: 3px 8px;
    font-size: 10px;
    letter-spacing: 0.5px;
    color: var(--dim);
    border: 1px solid var(--border);
  }
  .chart-toggle.active {
    color: #000;
    background: var(--amber);
    border-color: var(--amber);
    font-weight: 700;
  }

  .sentiment-box {
    margin-top: 16px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .sentiment-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px 10px;
    margin-bottom: 10px;
  }
  .sentiment-cell .k { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
  .sentiment-cell .v { font-size: 13px; margin-top: 2px; font-weight: 700; }
  .range-bar-wrap { margin: 8px 0 4px; }
  .range-bar {
    position: relative;
    height: 6px;
    background: linear-gradient(to right, var(--red), var(--dim), var(--green));
    border-radius: 3px;
  }
  .range-bar-fill { display: none; }
  .range-bar-marker {
    position: absolute;
    top: -3px;
    width: 2px;
    height: 12px;
    background: #fff;
    transform: translateX(-1px);
  }
  .range-bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--dim);
    margin-top: 3px;
  }
  .sentiment-disclaimer {
    font-size: 9px;
    color: var(--dim);
    margin-top: 8px;
    font-style: italic;
  }

  .statusbar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 4px 10px;
    display: flex;
    justify-content: space-between;
    color: var(--dim);
    font-size: 11px;
  }
  .statusbar .ok { color: var(--green); }
  .statusbar .err { color: var(--red); }

  .price-big { font-size: 26px; font-weight: 700; }

  .empty {
    color: var(--dim);
    padding: 20px 0;
    text-align: center;
  }

  /* market status badge */
  .mkt-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border: 1px solid currentColor;
    margin-left: 8px;
  }
  .mkt-badge.open  { color: var(--green); border-color: var(--green); }
  .mkt-badge.closed { color: var(--red);   border-color: var(--red); }
  .mkt-badge.pre   { color: var(--amber);  border-color: var(--amber); }
  .mkt-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .mkt-badge.closed .mkt-dot { animation: none; }

  /* market summary */
  .summary-bar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 10px 14px;
  }
  .summary-bar h2 { margin: 0 0 8px; font-size: 11px; color: var(--amber); letter-spacing: 1px; }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px 20px;
  }
  .summary-col { border-left: 2px solid var(--border); padding-left: 10px; }
  .summary-col h3 { margin: 0 0 5px; font-size: 10px; color: var(--dim); letter-spacing: 0.5px; }
  .summary-stat { font-size: 11px; margin-bottom: 2px; }
  .summary-text { font-size: 11px; color: var(--dim); margin-top: 6px; line-height: 1.5; border-top: 1px solid var(--border); padding-top: 6px; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; }

  /* CMD bar dropdown */
  .cmd-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #0e0e0e;
    border: 1px solid var(--amber);
    border-top: none;
    z-index: 1000;
    max-height: 300px;
    overflow-y: auto;
  }
  .cmd-suggestion {
    padding: 7px 12px;
    cursor: pointer;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cmd-suggestion:hover { background: #1a1a0a; }
  .cmd-sug-type {
    color: #000;
    background: var(--amber);
    font-size: 9px;
    font-weight: 700;
    padding: 1px 4px;
    letter-spacing: 0.5px;
    min-width: 44px;
    text-align: center;
  }
  .cmd-sug-label { color: var(--cyan); font-weight: 700; min-width: 80px; }
  .cmd-sug-name { color: var(--dim); font-size: 11px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cmd-hint { color: var(--dim); font-size: 10px; padding: 6px 12px; font-style: italic; }

  /* ── LOGIN SCREEN ────────────────────────────────────────────────────────── */
  .logout-btn {
    position: fixed;
    top: 6px;
    right: 10px;
    z-index: 8888;
    background: transparent;
    border: 1px solid rgba(0,0,0,0.5);
    color: #000;
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .logout-btn:hover { opacity: 1; }
  @media (max-width: 640px) {
    .logout-btn { font-size: 9px; padding: 3px 6px; top: 5px; right: 8px; }
  }

  .login-screen {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 20px;
    overflow: hidden;
  }
  .login-screen::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1;
  }
  .login-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  @keyframes boxGlow {
    0%,100% { box-shadow: 0 0 12px rgba(255,153,0,0.4), 0 0 30px rgba(255,153,0,0.1), inset 0 0 20px rgba(255,153,0,0.03); }
    50%      { box-shadow: 0 0 24px rgba(255,153,0,0.7), 0 0 60px rgba(255,153,0,0.2), inset 0 0 30px rgba(255,153,0,0.06); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .login-box {
    background: rgba(6,5,0,0.92);
    border: 1px solid var(--amber);
    padding: 36px 32px 28px;
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 2;
    animation: boxGlow 3s ease-in-out infinite, fadeIn 0.6s ease;
    backdrop-filter: blur(4px);
  }
  .login-logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .login-logo h1 {
    color: var(--amber);
    font-size: 20px;
    letter-spacing: 4px;
    margin: 12px 0 5px;
    font-family: inherit;
  }
  .login-subtitle {
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 2px;
    margin: 0;
  }
  .login-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 0 24px;
  }
  .login-field {
    margin-bottom: 16px;
  }
  .login-field label {
    display: block;
    color: var(--amber);
    font-size: 10px;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .login-field input {
    width: 100%;
    background: #000;
    border: 1px solid var(--border);
    color: var(--green);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .login-field input:focus { border-color: var(--amber); }
  .login-field input::placeholder { color: var(--dim); }
  .login-error {
    color: var(--red);
    font-size: 11px;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .login-btn {
    width: 100%;
    background: var(--amber);
    color: #000;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 13px;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.85; }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-note {
    color: var(--dim);
    font-size: 10px;
    text-align: center;
    margin: 20px 0 0;
    letter-spacing: 0.5px;
    line-height: 1.6;
  }
  .login-ticker {
    font-size: 28px;
    margin-bottom: 4px;
  }
  .login-socials {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .login-social-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--dim);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    transition: color 0.2s, border-color 0.2s;
  }
  .login-social-btn:hover { color: var(--amber); border-color: var(--amber); }
  .login-social-btn svg { width: 13px; height: 13px; fill: currentColor; }

  /* ── RESPONSIVE / CROSS-DEVICE ───────────────────────────────────────────── */

  /* Base touch improvements (all devices) */
  * { -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  .panel, .sidebar, .indices-bar, .tabs {
    -webkit-overflow-scrolling: touch;
  }

  /* Safe area padding for notched phones (iPhone X+) */
  .topbar {
    padding-left: max(10px, env(safe-area-inset-left));
    padding-right: max(10px, env(safe-area-inset-right));
  }
  .statusbar {
    padding-bottom: max(4px, env(safe-area-inset-bottom));
  }

  /* ── TABLET (iPad, Android tablet) — 768px to 1100px ── */
  @media (max-width: 1100px) and (min-width: 641px) {
    /* 2-column layout: main + sidebar */
    .body {
      grid-template-columns: 1fr 300px;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    /* Ticker spans both columns */
    .ticker-tape { grid-column: 1 / -1; }

    .index-blocks { grid-template-columns: 1fr 1fr; }
    .sentiment-grid { grid-template-columns: 1fr 1fr; }
    .summary-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .acct-summary { grid-template-columns: 1fr 1fr; }

    .price-big { font-size: 22px; }

function extractYahooOhlc(chartJson) {

  const prev = React.useRef(value);

  useEffect(() => {
    if (prev.current != null && value != null && value !== prev.current) {
      setFlash(value > prev.current ? "flash-up" : "flash-down");
      const t = setTimeout(() => setFlash(""), 900);
      prev.current = value;
      return () => clearTimeout(t);
    }
    prev.current = value;
  }, [value]);
  return E("span", {
    className: ((className || "") + " " + flash).trim(),
    style: { display: "inline-block", padding: "0 4px", borderRadius: 2 }
  }, render ? render(value) : value);
}

function Candlestick({ ohlc }) {
  if (!ohlc || ohlc.length < 2) {
    return E("div", { className: "empty" }, "NO CHART DATA");
  }
  const chartW = 540, labelW = 70, w = chartW + labelW, h = 160, pad = 4;
  const highs = ohlc.map((c) => c.high);
  const lows = ohlc.map((c) => c.low);
  const min = Math.min(...lows);
  const max = Math.max(...highs);
  const range = max - min || 1;
  const n = ohlc.length;
  const slot = (chartW - pad * 2) / n;
  const candleW = Math.max(1, slot * 0.6);
  const y = (v) => h - pad - ((v - min) / range) * (h - pad * 2);
  const currentPrice = ohlc[ohlc.length - 1].close;
  const currentY = y(currentPrice);
  const isUp = currentPrice >= ohlc[0].close;
  const priceColor = isUp ? "var(--green)" : "var(--red)";
  const candles = ohlc.map((c, i) => {
    const x = pad + i * slot + slot / 2;
    const up = c.close >= c.open;
    const color = up ? "var(--green)" : "var(--red)";
    const bodyTop = y(Math.max(c.open, c.close));
    const bodyBottom = y(Math.min(c.open, c.close));
    const bodyHeight = Math.max(1, bodyBottom - bodyTop);
    return E("g", { key: i },
      E("line", { x1: x, x2: x, y1: y(c.high), y2: y(c.low), stroke: color, strokeWidth: "1" }),
      E("rect", { x: x - candleW / 2, y: bodyTop, width: candleW, height: bodyHeight, fill: color })
    );
  });
  const labelY = Math.max(10, Math.min(h - 10, currentY));
  return E("svg", { viewBox: `0 0 ${w} ${h}`, preserveAspectRatio: "none", style: { overflow: "visible" } },
    ...candles,
    E("line", { x1: pad, x2: chartW, y1: currentY, y2: currentY, stroke: priceColor, strokeWidth: "1", strokeDasharray: "4 3", opacity: "0.85" }),

    E("text", { x: chartW + labelW / 2 + 1, y: labelY + 4, textAnchor: "middle", fill: "#000", fontSize: "9", fontWeight: "700", fontFamily: "monospace" }, fmtChartPrice(currentPrice))
  );
}

function Chart({ chartType, ohlc }) {

function computeSentiment({ price, fiftyTwoWeekHigh, fiftyTwoWeekLow, ohlc }) {
  let trendPct = null;
  let volatilityLabel = null;
  let dailyVolPct = null;
  if (ohlc && ohlc.length >= 2) {
    const first = ohlc[0].close;
    const last = ohlc[ohlc.length - 1].close;
    if (first) trendPct = ((last - first) / first) * 100;

    const dailyMoves = [];
    for (let i = 1; i < ohlc.length; i++) {
      const prev = ohlc[i - 1].close;
      if (prev) dailyMoves.push(((ohlc[i].close - prev) / prev) * 100);
    }
    if (dailyMoves.length > 0) {
      const mean = dailyMoves.reduce((a, b) => a + b, 0) / dailyMoves.length;
      const variance = dailyMoves.reduce((a, b) => a + (b - mean) * (b - mean), 0) / dailyMoves.length;
      const stdev = Math.sqrt(variance);
      dailyVolPct = stdev;
      volatilityLabel = stdev < 1 ? "LOW" : stdev < 3 ? "MODERATE" : "HIGH";
    }
  }

  let rangePosition = null;
  if (
    price !== undefined && price !== null &&
    fiftyTwoWeekHigh !== undefined && fiftyTwoWeekHigh !== null &&
    fiftyTwoWeekLow !== undefined && fiftyTwoWeekLow !== null &&
    fiftyTwoWeekHigh !== fiftyTwoWeekLow
  ) {
    rangePosition = ((price - fiftyTwoWeekLow) / (fiftyTwoWeekHigh - fiftyTwoWeekLow)) * 100;
  }

  let momentumLabel = "NEUTRAL";
  if (trendPct !== null) {
    momentumLabel = trendPct > 2 ? "BULLISH" : trendPct < -2 ? "BEARISH" : "NEUTRAL";
  }

  return { trendPct, volatilityLabel, dailyVolPct, rangePosition, momentumLabel };
}

function normCdf(x) {
  const t = 1 / (1 + 0.2316419 * Math.abs(x));
  const d = 0.3989423 * Math.exp((-x * x) / 2);
  let p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
  if (x >= 0) p = 1 - p;
  return p;
}

function bsPrice(S, K, T, sigma, r, type) {

    return type === "CALL" ? Math.max(S - K, 0) : Math.max(K - S, 0);
  }
  const d1 = (Math.log(S / K) + (r + (sigma * sigma) / 2) * T) / (sigma * Math.sqrt(T));
  const d2 = d1 - sigma * Math.sqrt(T);
  if (type === "CALL") {
    return S * normCdf(d1) - K * Math.exp(-r * T) * normCdf(d2);
  }
  return K * Math.exp(-r * T) * normCdf(-d2) - S * normCdf(-d1);
}

function Sparkline({ points }) {
  if (!points || points.length < 2) {
    return E("div", { className: "empty" }, "NO CHART DATA");
  }
  const chartW = 540, labelW = 70, w = chartW + labelW, h = 150, pad = 4;
  const min = Math.min(...points);
  const max = Math.max(...points);
  const range = max - min || 1;
  const stepX = (chartW - pad * 2) / (points.length - 1);
  const coords = points.map((p, i) => {
    const x = pad + i * stepX;
    const y = h - pad - ((p - min) / range) * (h - pad * 2);
    return [x, y];
  });
  const d = coords.map((c, i) => (i === 0 ? "M" : "L") + c[0].toFixed(1) + "," + c[1].toFixed(1)).join(" ");
  const last = points[points.length - 1];
  const first = points[0];
  const color = last >= first ? "var(--green)" : "var(--red)";
  const areaD = d + ` L${coords[coords.length - 1][0].toFixed(1)},${h} L${coords[0][0].toFixed(1)},${h} Z`;
  const lastCoord = coords[coords.length - 1];
  const currentY = lastCoord[1];
  const labelY = Math.max(10, Math.min(h - 10, currentY));
  return E("svg", { viewBox: `0 0 ${w} ${h}`, preserveAspectRatio: "none", style: { overflow: "visible" } },
    E("path", { d: areaD, fill: color, opacity: "0.08", stroke: "none" }),
    E("path", { d, fill: "none", stroke: color, strokeWidth: "1.5" }),
    E("line", { x1: pad, x2: chartW, y1: currentY, y2: currentY, stroke: color, strokeWidth: "1", strokeDasharray: "4 3", opacity: "0.85" }),
    E("rect", { x: chartW + 2, y: labelY - 9, width: labelW - 4, height: 16, fill: color, rx: "2" }),
    E("text", { x: chartW + labelW / 2 + 1, y: labelY + 4, textAnchor: "middle", fill: "#000", fontSize: "9", fontWeight: "700", fontFamily: "monospace" }, fmtChartPrice(last))
  );
}

// Real-time market status using hardcoded exchange hours (updates every minute)
function computeMarketStatus(exchange) {
  const ex = (exchange || "").toUpperCase();
  const now = new Date();
  const day = now.getUTCDay(); // 0=Sun, 6=Sat
  const isWeekday = day >= 1 && day <= 5;
  const todayUTC = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()) / 1000;
  const nowTs = Math.floor(Date.now() / 1000);

  // NSE / BSE — Mon-Fri 9:15 AM–3:30 PM IST = 3:45 AM–10:00 AM UTC
  if (ex.includes("NSE") || ex.includes("BSE") || ex.includes("NSI") || ex.includes("INDIA")) {
    const openTs  = todayUTC + 3*3600 + 45*60;
    const closeTs = todayUTC + 10*3600;
    const preTs   = todayUTC + 3*3600 + 15*60; // 9:15 AM IST pre-open
    const isOpen  = isWeekday && nowTs >= openTs && nowTs < closeTs;
    const isPre   = isWeekday && nowTs >= preTs  && nowTs < openTs;
    return { open: isOpen, pre: isPre, exchange: "NSE", closeAt: closeTs, openAt: openTs };
  }

  // NYSE / NASDAQ / US — Mon-Fri 9:30 AM–4:00 PM ET
  // EDT = UTC-4 (Mar–Nov), EST = UTC-5 (Nov–Mar)
  if (ex.includes("NYSE") || ex.includes("NASDAQ") || ex === "NMS" || ex === "NGM" || ex === "NCM" || ex === "BATS" || ex === "CBOE") {
    const mo = now.getUTCMonth() + 1;
    const isDST = mo >= 3 && mo <= 11;
    const offset = isDST ? 4 : 5;
    const openTs  = todayUTC + (9 + offset)*3600 + 30*60;
    const closeTs = todayUTC + (16 + offset)*3600;
    const preTs   = todayUTC + (4 + offset)*3600;
    const isOpen  = isWeekday && nowTs >= openTs && nowTs < closeTs;
    const isPre   = isWeekday && nowTs >= preTs  && nowTs < openTs;
    return { open: isOpen, pre: isPre, exchange, closeAt: closeTs, openAt: openTs };
  }

  // LSE (London) — Mon-Fri 8:00 AM–4:30 PM BST/GMT
  if (ex.includes("LSE") || ex.includes("LONDON") || ex === "LON") {
    const mo = now.getUTCMonth() + 1;
    const offset = (mo >= 3 && mo <= 10) ? 1 : 0; // BST=UTC+1
    const openTs  = todayUTC + (8 - offset)*3600;
    const closeTs = todayUTC + (16 - offset)*3600 + 30*60;
    const isOpen  = isWeekday && nowTs >= openTs && nowTs < closeTs;
    return { open: isOpen, pre: false, exchange: "LSE", closeAt: closeTs, openAt: openTs };
  }

  // Crypto — 24/7
  if (ex.includes("CRYPTO") || ex.includes("CCC") || ex.includes("COINBASE") || ex.includes("BINANCE")) {
    return { open: true, pre: false, exchange: "CRYPTO", closeAt: null, openAt: null };
  }

  return null;
}

function fmtCountdown(secs) {
  if (secs == null || secs <= 0) return null;
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  if (h > 0) return h + "h " + m + "m";
  if (m > 0) return m + "m " + s + "s";
  return s + "s";
}

function MarketBadge({ status }) {
  const [now, setNow] = useState(Math.floor(Date.now() / 1000));
  useEffect(() => {
    const t = setInterval(() => setNow(Math.floor(Date.now() / 1000)), 1000);
    return () => clearInterval(t);
  }, []);
  if (!status) return null;
  const cls = status.open ? "open" : status.pre ? "pre" : "closed";
  const label = status.open ? "LIVE" : status.pre ? "PRE-MKT" : "CLOSED";
  const countdown = status.open
    ? fmtCountdown(status.closeAt - now)
    : fmtCountdown(status.openAt - now);
  const countdownLabel = status.open && countdown
    ? " · closes in " + countdown
    : !status.open && countdown
      ? " · opens in " + countdown
      : null;
  return E("span", { className: "mkt-badge " + cls },
    E("span", { className: "mkt-dot" }),
    label + (status.exchange ? " · " + status.exchange : ""),
    countdownLabel
  );
}

  const intlIndices  = stocks.filter(s => s.isIndex && !s.error && s.changePct != null);

  const summarise = (list) => {
    if (!list.length) return null;
    const gainers = list.filter(s => s.changePct > 0).length;
    const losers  = list.filter(s => s.changePct < 0).length;
    const best  = list.reduce((a, b) => b.changePct > a.changePct ? b : a, list[0]);
    const worst = list.reduce((a, b) => b.changePct < a.changePct ? b : a, list[0]);
    const mood = gainers > losers * 1.5 ? "BULLISH" : losers > gainers * 1.5 ? "BEARISH" : "MIXED";
    return { gainers, losers, best, worst, mood, total: list.length };
  };

  const indiaSummary = summarise(indiaStocks);
  const intlSummary  = summarise(intlStocks);
  const cryptoList   = coins.filter(c => c.price_change_percentage_24h != null);

    const cols = Math.floor(window.innerWidth / 18);
    const drops = Array.from({length: cols}, () => Math.random() * -50);
    const draw = () => {
      ctx.fillStyle = "rgba(0,0,0,0.06)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drops.forEach((y, i) => {
        const char = chars[Math.floor(Math.random() * chars.length)];
        const bright = Math.random();
        ctx.font = bright > 0.97 ? "bold 13px monospace" : "12px monospace";
        ctx.fillStyle = bright > 0.97 ? "#ff9900" : bright > 0.85 ? "#6b3a00" : "#2a1800";
        ctx.fillText(char, i * 18, y * 18);
        if (y * 18 > canvas.height && Math.random() > 0.97) drops[i] = 0;
        drops[i] += 0.5;
      });
    };
    const id = setInterval(draw, 40);
    return () => { clearInterval(id); window.removeEventListener("resize", resize); };
  }, []);
  return E("canvas", { ref: canvasRef, className: "login-canvas" });
}

function StockDetailPage({ symbol, source, rowData, onBack }) {
  const [chartData, setChartData] = useState(null);
  const [chartRange, setChartRange] = useState("1d");
  const [chartType, setChartType] = useState("candles");
  const [chartLoading, setChartLoading] = useState(false);
  const [news, setNews] = useState([]);
  const [newsLoading, setNewsLoading] = useState(false);
  const [fundamentals, setFundamentals] = useState({});
  const [detailTab, setDetailTab] = useState("overview");
  const [company, setCompany] = useState(null);
  const [companyLoading, setCompanyLoading] = useState(false);
  const [peers, setPeers] = useState(null);
  const [peersLoading, setPeersLoading] = useState(false);
  const proxyBase = window.location.origin;

  // Reset per-security view state when navigating to a different symbol
  useEffect(() => {
    setDetailTab("overview");
    setCompany(null);
    setPeers(null);
  }, [symbol]);

  useEffect(() => {
    setChartLoading(true);
    setChartData(null);
    if (source === "crypto") {
      const days = COINGECKO_DAYS_MAP[chartRange] || 30;
      fetch(`https://api.coingecko.com/api/v3/coins/${encodeURIComponent(symbol)}/ohlc?vs_currency=usd&days=${days}`)
        .then(r => r.json())
        .then(data => {
          const ohlc = (Array.isArray(data) ? data : []).map(([t, o, h, l, c]) => ({ time: Math.floor(t / 1000), open: o, high: h, low: l, close: c }));
          setChartData(ohlc);
        })
        .catch(() => setChartData([]))
        .finally(() => setChartLoading(false));
    } else {
      const rm = YAHOO_RANGE_MAP[chartRange] || { range: "1mo", interval: "1d" };
      fetch(`${proxyBase}/api/yahoo?symbol=${encodeURIComponent(symbol)}&range=${rm.range}&interval=${rm.interval}`)
        .then(r => r.json())
        .then(data => {
          const result = data?.chart?.result?.[0];
          if (!result) { setChartData([]); return; }
          const ts = result.timestamp || [];
          const q = result.indicators?.quote?.[0] || {};
          const ohlc = ts.map((t, i) => ({ time: t, open: q.open?.[i], high: q.high?.[i], low: q.low?.[i], close: q.close?.[i] }))
            .filter(x => x.open != null && x.close != null);
          setChartData(ohlc);
        })
        .catch(() => setChartData([]))
        .finally(() => setChartLoading(false));
    }
  }, [symbol, source, chartRange]);

  const loadNews = useCallback(() => {
    setNewsLoading(true);
    const primary = source === "crypto"
      ? (rowData?.name || symbol)
      : (rowData?.name || symbol.split(".")[0]);
    const fallback = source === "crypto"
      ? "cryptocurrency market"
      : source === "india"
        ? "Indian stock market"
        : "stock market";
    const fetchNewsFor = (q) =>
      fetch(`${proxyBase}/api/yahoo-search?q=${encodeURIComponent(q)}&quotesCount=0&newsCount=25`)
        .then(r => r.json())
        .then(data => (data.news || []).slice().sort((a, b) => (b.providerPublishTime || 0) - (a.providerPublishTime || 0)));

    return fetchNewsFor(primary)
      .then(items => {
        if (items.length > 0) { setNews(items); return; }
        return fetchNewsFor(fallback).then(setNews);
      })
      .catch(() => setNews([]))
      .finally(() => setNewsLoading(false));
  }, [symbol, source, rowData, proxyBase]);

  useEffect(() => { loadNews(); }, [loadNews]);

  useEffect(() => {
    if (source === "crypto") return;
    fetch(`${proxyBase}/api/fundamentals?symbol=${encodeURIComponent(symbol)}`)
      .then(r => r.json())
      .then(data => setFundamentals(data))
      .catch(() => setFundamentals({}));
  }, [symbol, source]);

  // Company profile + financial statements (12h server cache)
  useEffect(() => {
    if (source === "crypto") return;
    setCompanyLoading(true);
    fetch(`${proxyBase}/api/company?symbol=${encodeURIComponent(symbol)}`)
      .then(r => r.json())
      .then(data => setCompany(data || {}))
      .catch(() => setCompany({}))
      .finally(() => setCompanyLoading(false));
  }, [symbol, source]);

  const loadPeers = useCallback(() => {
    const peerSyms = getPeerSymbols(symbol);
    if (peerSyms.length === 0) { setPeers([]); return; }
    setPeersLoading(true);
    Promise.all([symbol, ...peerSyms].map((sy) =>
      Promise.all([
        fetch(`${proxyBase}/api/yahoo?symbol=${encodeURIComponent(sy)}`).then(r => r.json()).catch(() => null),
        fetch(`${proxyBase}/api/fundamentals?symbol=${encodeURIComponent(sy)}`).then(r => r.json()).catch(() => ({}))
      ]).then(([quote, fund]) => {
        const m = quote?.chart?.result?.[0]?.meta;
        if (!m) return null;
        const px = m.regularMarketPrice;
        const prev = m.previousClose ?? m.chartPreviousClose;
        const chg = (px != null && prev) ? ((px - prev) / prev) * 100 : null;
        return { symbol: sy, label: SYMBOL_LABELS[sy] || sy.split(".")[0], price: px,
                 changePct: chg, marketCap: (fund && fund.marketCap) || null,
                 pe: (fund && fund.trailingPE) || null,
                 currency: m.currency || "", isSelf: sy === symbol };
      }).catch(() => null)
    )).then(rows => setPeers(rows.filter(Boolean)))
      .finally(() => setPeersLoading(false));
  }, [symbol, proxyBase]);

  useEffect(() => {
    if (detailTab === "peers" && peers === null && !peersLoading) loadPeers();
  }, [detailTab, peers, peersLoading, loadPeers]);

  const isInr = source === "india";
  const currency = isInr ? "INR" : source === "crypto" ? "USD" : (rowData?.currency || "USD");
  const price = rowData?.current_price ?? rowData?.price ?? 0;
  const changePct = rowData?.price_change_percentage_24h ?? rowData?.changePct ?? 0;
  const label = source === "crypto" ? (rowData?.symbol || symbol).toUpperCase() : (rowData?.label || symbol);
  const name = rowData?.name || symbol;
  const d = rowData || {};

  const symOf = (cur) => cur === "INR" ? "₹" : cur === "USD" ? "$"
    : (cur === "GBP" || cur === "GBp") ? "£" : cur === "EUR" ? "€"
    : cur === "JPY" ? "¥" : (cur ? cur + " " : "");
  const curSym = symOf(currency);
  const ratios = (company && company.ratios) || {};
  const profile = (company && company.profile) || {};
  const pctOf = (v) => v == null ? "--" : (v * 100).toFixed(2) + "%";
  const fmtRev = (v) => {
    if (v == null) return "--";
    if (isInr) return "₹" + (v / 1e7).toLocaleString("en-IN", { maximumFractionDigits: 0 }) + " Cr";
    const b = v / 1e9;
    return (curSym || "") + (Math.abs(b) >= 1 ? b.toFixed(2) + "B" : (v / 1e6).toFixed(1) + "M");
  };

  // ── Compounded growth (CAGR) from annual financials (newest-first) ──
  const annualRows = (company && company.annual) || [];
  const cagrOf = (key) => {
    const vals = annualRows.map(r => r[key]).filter(v => v != null && v > 0);
    if (vals.length < 2) return null;
    const years = vals.length - 1;
    return { rate: Math.pow(vals[0] / vals[vals.length - 1], 1 / years) - 1, years };
  };
  const revCagr = cagrOf("revenue");
  const profitCagr = cagrOf("netIncome");

  // ── Pros & Cons (rule-based, screener-style) ──
  const pros = [], cons = [];
  const de = ratios.debtToEquity != null ? ratios.debtToEquity / 100 : null;
  const latestAnnualNI = annualRows.length ? annualRows[0].netIncome : null;
  if (de != null && de < 0.15) pros.push("Company is almost debt free.");
  if (ratios.roe != null && ratios.roe > 0.15) pros.push("Good return on equity (ROE) of " + (ratios.roe * 100).toFixed(1) + "%.");
  if (profitCagr && profitCagr.rate > 0.20) pros.push("Strong profit growth of " + (profitCagr.rate * 100).toFixed(0) + "% CAGR over " + profitCagr.years + " years.");
  if (revCagr && revCagr.rate > 0.15) pros.push("Healthy revenue growth of " + (revCagr.rate * 100).toFixed(0) + "% CAGR over " + revCagr.years + " years.");
  if (ratios.profitMargin != null && ratios.profitMargin > 0.15) pros.push("Strong profit margin of " + (ratios.profitMargin * 100).toFixed(1) + "%.");
  if (ratios.trailingPE != null && ratios.trailingPE > 0 && ratios.trailingPE < 15) pros.push("Attractively valued at a P/E of " + ratios.trailingPE.toFixed(1) + ".");
  if (ratios.priceToBook != null && ratios.priceToBook > 0 && ratios.priceToBook < 1) pros.push("Trading below book value (P/B " + ratios.priceToBook.toFixed(2) + ").");
  if (ratios.roa != null && ratios.roa > 0.12) pros.push("Efficient asset use — return on assets of " + (ratios.roa * 100).toFixed(1) + "%.");

  if (ratios.priceToBook != null && ratios.priceToBook > 5) cons.push("Trading at " + ratios.priceToBook.toFixed(2) + "x its book value.");
  if (ratios.trailingPE != null && ratios.trailingPE > 50) cons.push("Expensive valuation at a P/E of " + ratios.trailingPE.toFixed(0) + ".");
  if (ratios.roe != null && ratios.roe < 0.10) cons.push("Low return on equity of " + (ratios.roe * 100).toFixed(1) + "%.");
  if (de != null && de > 1.5) cons.push("High debt-to-equity of " + de.toFixed(2) + ".");
  if ((ratios.dividendYield == null || ratios.dividendYield === 0) && latestAnnualNI != null && latestAnnualNI > 0) cons.push("Not paying a dividend despite reporting profits.");
  if (ratios.profitMargin != null && ratios.profitMargin < 0.05 && ratios.profitMargin >= 0) cons.push("Thin profit margin of " + (ratios.profitMargin * 100).toFixed(1) + "%.");
  if (latestAnnualNI != null && latestAnnualNI < 0) cons.push("Reported a net loss in the latest financial year.");

  const prosConsEl = source === "crypto" ? null : E("div", { className: "panel", style: { flexShrink: 0 } },
    E("h2", null, "ANALYSIS — PROS & CONS"),
    (companyLoading && !company)
      ? E("div", { className: "empty" }, "LOADING...")
      : (pros.length === 0 && cons.length === 0)
        ? E("div", { className: "empty" }, "NOT ENOUGH DATA FOR ANALYSIS")
        : E("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 } },
            E("div", null,
              E("div", { style: { color: "var(--green)", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 6 } }, "▲ PROS"),
              pros.length
                ? E("ul", { style: { margin: 0, paddingLeft: 16, color: "#ccc", fontSize: 11.5, lineHeight: 1.7 } }, pros.map((p, i) => E("li", { key: i }, p)))
                : E("div", { style: { color: "var(--dim)", fontSize: 11 } }, "—")
            ),
            E("div", null,
              E("div", { style: { color: "var(--red)", fontSize: 11, fontWeight: 700, letterSpacing: 1, marginBottom: 6 } }, "▼ CONS"),
              cons.length
                ? E("ul", { style: { margin: 0, paddingLeft: 16, color: "#ccc", fontSize: 11.5, lineHeight: 1.7 } }, cons.map((c, i) => E("li", { key: i }, c)))
                : E("div", { style: { color: "var(--dim)", fontSize: 11 } }, "—")
            )
          ),
    E("div", { style: { color: "var(--dim)", fontSize: 10, marginTop: 10, fontStyle: "italic" } }, "Auto-generated from reported ratios — not investment advice.")
  );

  const growthCard = (title, cagrObj, ttm) => E("div", { className: "panel", style: { flex: 1, minWidth: 150 } },
    E("div", { style: { color: "var(--amber)", fontSize: 10, letterSpacing: 1, marginBottom: 8 } }, title),
    cagrObj
      ? E("div", null,
          E("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 } },
            E("span", { style: { color: "var(--dim)" } }, cagrObj.years + "Y CAGR"),
            E("span", { className: "mono-num " + (cagrObj.rate >= 0 ? "up" : "down") }, (cagrObj.rate >= 0 ? "+" : "") + (cagrObj.rate * 100).toFixed(1) + "%")
          ),
          ttm != null ? E("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12 } },
            E("span", { style: { color: "var(--dim)" } }, "TTM"),
            E("span", { className: "mono-num " + (ttm >= 0 ? "up" : "down") }, (ttm >= 0 ? "+" : "") + (ttm * 100).toFixed(1) + "%")
          ) : null
        )
      : E("div", { style: { color: "var(--dim)", fontSize: 11 } }, "N/A")
  );
  const growthRowEl = E("div", { style: { display: "flex", gap: 10, marginBottom: 10, flexWrap: "wrap" } },
    growthCard("COMPOUNDED SALES GROWTH", revCagr, ratios.revenueGrowth),
    growthCard("COMPOUNDED PROFIT GROWTH", profitCagr, null)
  );

  const newsEl = newsLoading
    ? E("div", { className: "empty" }, "LOADING NEWS...")
    : news.length === 0
      ? E("div", { className: "empty" }, "NO NEWS FOUND")
      : E("div", { className: "news-list" },
          news.map((n, i) =>
            E("a", { key: n.uuid || i, className: "news-item", href: n.link, target: "_blank", rel: "noopener noreferrer" },
              E("div", { className: "news-title" }, n.title),
              E("div", { className: "news-meta" }, (n.publisher || "") + (n.providerPublishTime ? " — " + timeAgo(n.providerPublishTime) : ""))
            )
          )
        );

  const newsPanelEl = E("div", { className: "panel", style: { overflowY: "auto" } },
    E("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 } },
      E("h2", { style: { margin: 0 } }, "LATEST NEWS"),
      E("button", {
        onClick: () => loadNews(),
        disabled: newsLoading,
        style: {
          background: "transparent", border: "1px solid var(--border)", color: "var(--dim)",
          fontFamily: "inherit", fontSize: 10, letterSpacing: 1, padding: "3px 8px",
          cursor: newsLoading ? "default" : "pointer", opacity: newsLoading ? 0.5 : 1,
          transition: "color 0.15s, border-color 0.15s"
        },
        onMouseEnter: (e) => { if (!newsLoading) { e.target.style.color = "var(--amber)"; e.target.style.borderColor = "var(--amber)"; } },
        onMouseLeave: (e) => { e.target.style.color = "var(--dim)"; e.target.style.borderColor = "var(--border)"; }
      }, newsLoading ? "↻ ..." : "↻ REFRESH")
    ),
    newsEl

  const chartPanelEl = E("div", { className: "panel", style: { flexShrink: 0 } },
    E("h2", null, "PRICE CHART"),
    chartLoading
      ? E("div", { className: "empty" }, "LOADING CHART...")

    E(ChartControls, { chartType, setChartType, range: chartRange, setRange: setChartRange }),
    !chartLoading && E(MarketSentiment, { price, fiftyTwoWeekHigh: d.fiftyTwoWeekHigh, fiftyTwoWeekLow: d.fiftyTwoWeekLow, ohlc: chartData })
  );

  // ── Key ratios block (screener-style) ──
  const ratioCell = (k, v) => E("div", null, E("div", { className: "k" }, k), E("div", { className: "v mono-num" }, v));
  const keyRatiosEl = E("div", { className: "panel", style: { flexShrink: 0 } },
    E("h2", null, "KEY RATIOS"),
    companyLoading && !company
      ? E("div", { className: "empty" }, "LOADING...")

function FeedbackModal({ onClose, userEmail, userName }) {
  const [message, setMessage] = useState("");
  const [phone, setPhone] = useState("");
  const [status, setStatus] = useState("idle"); // idle | sending | sent | error

  const submit = async () => {
    if (!message.trim() || status === "sending") return;
    setStatus("sending");
    try {
      const res = await fetch(`${window.location.origin}/api/feedback`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: message.trim(), phone: phone.trim(), email: userEmail || "", name: userName || "" })
      });
      if (!res.ok) throw new Error("request failed");
      setStatus("sent");
    } catch (e) {
      setStatus("error");
    }
  };

  return E("div", {
    style: {
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)",
      display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "monospace", zIndex: 9998, padding: "20px"
    },
    onClick: (e) => { if (e.target === e.currentTarget) onClose(); }
  },
    E("div", {
      style: {
        border: "1px solid var(--amber)", maxWidth: 460, width: "100%",
        background: "var(--panel)", padding: "28px 30px",
        boxShadow: "0 0 24px rgba(255,153,0,0.25)"
      }
    },
      E("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 } },
        E("div", { style: { color: "var(--amber)", fontSize: 14, fontWeight: 700, letterSpacing: 1 } }, "SHARE FEEDBACK"),
        E("button", {
          onClick: onClose,
          style: { background: "transparent", border: "none", color: "var(--dim)", fontSize: 16, cursor: "pointer" }
        }, "✕")
      ),
      status === "sent"
        ? E("div", { style: { color: "var(--green)", fontSize: 13, lineHeight: 1.7, textAlign: "center", padding: "20px 0" } },
            "Thanks — your feedback has been recorded.",
            E("div", { style: { marginTop: 16 } },
              E("button", {

                style: {
                  background: "var(--amber)", border: "none", color: "#000",

                  padding: "7px 18px", cursor: "pointer"
                }

            )
          )
        : E(React.Fragment, null,
            E("div", { style: { color: "var(--dim)", fontSize: 12, marginBottom: 16, lineHeight: 1.6 } },

            ),
            E("textarea", {
              value: message,
              onChange: (e) => setMessage(e.target.value),

              style: {
                width: "100%", background: "var(--bg)", border: "1px solid var(--border)",
                color: "#fff", fontFamily: "inherit", fontSize: 13, padding: "10px",
                resize: "vertical", marginBottom: 12, boxSizing: "border-box"
              }
            }),
            E("input", {
              type: "tel",
              value: phone,
              onChange: (e) => setPhone(e.target.value),
              placeholder: "Phone number (optional)",
              style: {
                width: "100%", background: "var(--bg)", border: "1px solid var(--border)",
                color: "#fff", fontFamily: "inherit", fontSize: 13, padding: "10px",
                marginBottom: 6, boxSizing: "border-box"
              }
            }),
            E("div", { style: { color: "var(--dim)", fontSize: 10.5, marginBottom: 18 } },

            ),

            ),

function AppWrapper() {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem("bloomyco_user")); } catch (_) { return null; }
  });
  const [disclaimerAccepted, setDisclaimerAccepted] = useState(false);
  const handleLogin = (u) => { setUser(u); };
  const handleAcceptDisclaimer = React.useCallback(() => setDisclaimerAccepted(true), []);
  const handleLogout = () => {
    try {
      const isGuest = !user || user.email === "guest@bloomyco.in";
      const durationSec = user && user.ts ? Math.round((Date.now() - user.ts) / 1000) : 0;
      if (!isGuest) fetch(window.location.origin + "/api/logout", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: (user && user.name) || "", email: (user && user.email) || "", duration_seconds: durationSec })
      }).catch(() => {});
    } catch (_) {}
    localStorage.removeItem("bloomyco_user");
    setUser(null);
    setDisclaimerAccepted(false);
  };
  if (!user) return E(LoginScreen, { onLogin: handleLogin });
  if (!disclaimerAccepted) return E(DisclaimerScreen, { onAccept: handleAcceptDisclaimer });
  return E(App, { onLogout: handleLogout, user });
}

    if (!query.trim()) return;
    setSearchLoading(true);
    setSearchError(null);
    setSelectedSearchResult(null);
    setSearchQuote(null);
    setSearchChartData(null);
    try {
      const trimmed = query.trim();
      const looksLikeTicker = /^[A-Za-z0-9.&-]{1,15}$/.test(trimmed) && !trimmed.includes(" ");
      const directCandidates = looksLikeTicker
        ? [trimmed.toUpperCase(), trimmed.toUpperCase() + ".NS", trimmed.toUpperCase() + ".BO"]
        : [];

      const [searchRes, ...directResults] = await Promise.all([
        fetch(`${LOCAL_PROXY_BASE}/api/yahoo-search?q=${encodeURIComponent(query)}&quotesCount=40`),
        ...directCandidates.map((sym) =>
          fetch(`${LOCAL_PROXY_BASE}/api/yahoo?symbol=${encodeURIComponent(sym)}`)
            .then((r) => (r.ok ? r.json() : null))
            .then((data) => {
              const result = data && data.chart && data.chart.result && data.chart.result[0];
              if (!result || !result.meta || !result.meta.regularMarketPrice) return null;
              const m = result.meta;
              return {
                symbol: m.symbol || sym,
                shortname: m.shortName,
                longname: m.longName,
                exchange: m.exchangeName,
                exchDisp: m.fullExchangeName,
                quoteType: m.instrumentType || "EQUITY"
              };
            })
            .catch(() => null)
        )
      ]);

      if (!searchRes.ok) throw new Error("HTTP " + searchRes.status);
      const data = await searchRes.json();
      const quotes = (data.quotes || []).filter((q) => q.symbol);

      const seen = new Set(quotes.map((q) => q.symbol));
      directResults.filter(Boolean).forEach((d) => {
        if (!seen.has(d.symbol)) {
          quotes.unshift(d);
          seen.add(d.symbol);
        }
      });

      const rank = (q) => {
        const isIndia = q.exchange === "NSI" || q.exchange === "BSE";
        const isEquityLike = q.quoteType === "EQUITY" || q.quoteType === "ETF" || q.quoteType === "INDEX";
        if (directCandidates.includes(q.symbol)) return -1;
        if (isIndia && q.quoteType === "EQUITY") return 0;
        if (isEquityLike) return 1;
        return 2;
      };
      quotes.sort((a, b) => rank(a) - rank(b));
      setSearchResults(quotes);
    } catch (e) {
      setSearchError(e.message || "search failed");
      setSearchResults([]);
    } finally {
      setSearchLoading(false);
    }
  }, []);

          id: Date.now() + Math.random(), kind: "SPOT", side: "LONG",
          source: asset.source, sourceId: asset.sourceId, label: asset.label, name: asset.name,
          currency: asset.currency, qty, entryPrice: asset.price, entryFx: fx, openedAt: Date.now()
        }];
      });
      setTradeQty("");
    } else if (tradeKind === "FUTURE") {
      const leverage = tradeLeverage || 1;
      const marginInr = (qty * asset.price * fx) / leverage;
      if (marginInr > cashInr) {
        setTradeError("Insufficient virtual margin for this order.");
        return;
      }
      setCashInr((c) => c - marginInr);
      setPositions((p) => [...p, {
        id: Date.now() + Math.random(), kind: "FUTURE", side: tradeSide,
        source: asset.source, sourceId: asset.sourceId, label: asset.label, name: asset.name,
        currency: asset.currency, qty, entryPrice: asset.price, entryFx: fx,
        leverage, marginInr, openedAt: Date.now()
      }]);
      setTradeQty("");
    } else if (tradeKind === "OPTION") {
      const strike = parseFloat(tradeStrike);
      if (!strike || strike <= 0) {
        setTradeError("Enter a valid strike price.");
        return;
      }
      const sentiment = computeSentiment({ price: asset.price, ohlc: asset.ohlc });
      const dailyVol = sentiment.dailyVolPct;
      if (dailyVol === null || dailyVol === undefined) {
        setTradeError("Not enough chart history yet to price this option — wait a moment and retry.");
        return;
      }
      const sigma = (dailyVol / 100) * Math.sqrt(252);
      const T = tradeExpiryDays / 365;
      const premium = bsPrice(asset.price, strike, T, sigma, RISK_FREE_RATE, tradeOptionType);
      const costInr = premium * qty * fx;
      if (costInr <= 0 || !isFinite(costInr)) {
        setTradeError("Could not price this option — try a different strike or expiry.");
        return;
      }
      if (costInr > cashInr) {
        setTradeError("Insufficient virtual cash for this premium.");
        return;
      }
      setCashInr((c) => c - costInr);
      setPositions((p) => [...p, {
        id: Date.now() + Math.random(), kind: "OPTION", optionType: tradeOptionType,
        source: asset.source, sourceId: asset.sourceId, label: asset.label, name: asset.name,
        currency: asset.currency, qty, strike, entryPrice: premium, entryFx: fx,
        sigma, expiryDays: tradeExpiryDays, openedAt: Date.now()
      }]);
      setTradeQty("");
      setTradeStrike("");
    }
  };

  const valuePosition = (pos) => {
    const S = getLivePrice(pos);
    const fx = fxToInr(pos.currency, fxRates) || pos.entryFx || 1;
    if (S === null) return { value: null, pnl: null, pnlPct: null, label: "PRICE UNAVAILABLE" };

    if (pos.kind === "SPOT") {
      const value = S * pos.qty * fx;
      const cost = pos.entryPrice * pos.qty * pos.entryFx;
      const pnl = value - cost;
      return { value, pnl, pnlPct: cost ? (pnl / cost) * 100 : null, current: S };
    }
    if (pos.kind === "FUTURE") {
      const dirSign = pos.side === "LONG" ? 1 : -1;
      const pnlNative = (S - pos.entryPrice) * pos.qty * pos.leverage * dirSign;
      const pnl = pnlNative * fx;
      const value = pos.marginInr + pnl;
      return { value, pnl, pnlPct: pos.marginInr ? (pnl / pos.marginInr) * 100 : null, current: S, liquidated: pnl <= -pos.marginInr };
    }
    if (pos.kind === "OPTION") {
      const daysElapsed = (Date.now() - pos.openedAt) / 86400000;
      const tRemaining = Math.max(0, (pos.expiryDays - daysElapsed) / 365);
      const premiumNow = bsPrice(S, pos.strike, tRemaining, pos.sigma, RISK_FREE_RATE, pos.optionType);
      const value = premiumNow * pos.qty * fx;
      const cost = pos.entryPrice * pos.qty * pos.entryFx;
      const pnl = value - cost;
      return { value, pnl, pnlPct: cost ? (pnl / cost) * 100 : null, current: S, expired: tRemaining <= 0, premiumNow };
    }
    return { value: null, pnl: null, pnlPct: null };

    const existing = positions.find((x) => x.kind === "SPOT" && x.source === asset.source && x.sourceId === asset.sourceId);

            ),
            E("div", { className: "pos-row-bottom" },
              E("span", { className: "mono-num" }, p.value !== null ? "₹" + fmtInr(p.value) : "--"),
              p.pnlPct !== null
                ? E("span", { className: "mono-num " + (p.pnl >= 0 ? "up" : "down"), style: { marginLeft: 6 } },
                    "(" + (p.pnl >= 0 ? "+" : "") + p.pnlPct.toFixed(1) + "%)"
                  )
                : null,
              E("span", { className: "pf-rm", onClick: () => closePosition(p.id) }, p.kind === "SPOT" ? "SELL" : "CLOSE")
            )
          )
        )
      );

  const portfolioPanelEl = E("div", { className: "panel", style: { flex: "1.4 1 0" } },
    E("h2", null, "PAPER TRADING"),
    E("div", { className: "acct-summary" },
      E("div", { className: "acct-cell" }, E("div", { className: "k" }, "CASH"), E("div", { className: "v mono-num" }, "₹" + fmtInr(cashInr))),
      E("div", { className: "acct-cell" }, E("div", { className: "k" }, "POSITIONS"), E("div", { className: "v mono-num" }, "₹" + fmtInr(positionsValueTotal))),
      E("div", { className: "acct-cell" },
        E("div", { className: "k" }, "TOTAL P&L"),
        E("div", { className: "v mono-num " + (portfolioPnl >= 0 ? "up" : "down") }, (portfolioPnl >= 0 ? "+" : "") + "₹" + fmtInr(portfolioPnl))
      )
    ),
    tradeFormEl,
    E("div", { className: "india-section-label" }, "OPEN POSITIONS"),
    positionsListEl,
    E("div", { className: "sentiment-disclaimer" }, "Paper trading with virtual currency — no real trades are placed. Futures are leveraged spot; options use a simplified Black-Scholes estimate, not real market premiums.")
  );

  const sidebarEl = E("div", { className: "sidebar" }, newsPanelEl, heatmapPanelEl, portfolioPanelEl);

  const bodyEl = E("div", { className: "body" }, watchlistPanelEl, detailPanelEl, sidebarEl);

  const statusSource = tab === "crypto" ? "COINGECKO API"
    : tab === "stocks" ? "YAHOO FINANCE (VIA LOCAL PROXY)"
    : tab === "india" ? "YAHOO FINANCE (VIA LOCAL PROXY)"
    : "YAHOO FINANCE SEARCH (VIA LOCAL PROXY)";
  const statusErr = tab === "crypto" ? error : tab === "stocks" ? stocksError : tab === "india" ? indiaError : (searchQuoteError || searchError);
  const statusUpdate = tab === "crypto" ? lastUpdate : tab === "stocks" ? stocksLastUpdate : tab === "india" ? indiaLastUpdate : null;

  const statusBarEl = E("div", { className: "statusbar" },
    E("span", null,
      "DATA SOURCE: " + statusSource + " ",
      statusErr
        ? E("span", { className: "err" }, "— ERROR: " + statusErr)
        : E("span", { className: "ok" }, "— LIVE")
    ),
    E("span", null,
      "LAST UPDATE: ",
      statusUpdate ? statusUpdate.toLocaleTimeString() : "--"
    )
  );

  const feedbackModalEl = showFeedback
    ? E(FeedbackModal, { onClose: () => setShowFeedback(false), userEmail: user && user.email, userName: user && user.name })
    : null;

  if (detailView) {
    return E(React.Fragment, null,
      E("div", { className: "terminal" },
        topbarEl,
        tickerTapeEl,
        E("div", { style: { flex: 1, minHeight: 0, overflow: "hidden", display: "flex", flexDirection: "column" } },
          E(StockDetailPage, {
            symbol: detailView.symbol,
            source: detailView.source,
            rowData: detailView.rowData,
            onBack: () => setDetailView(null)
          })
        ),
        statusBarEl
      ),
      feedbackModalEl
    );
  }

  return E(React.Fragment, null,
    E("div", { className: "terminal" },
      topbarEl,
      cmdbarEl,
      indicesBarEl,
      tickerTapeEl,
      bodyEl,
      E(MarketSummaryBar, { india, stocks, coins, global }),
      statusBarEl
    ),
    feedbackModalEl
  );
}

const root = createRoot(document.getElementById("root"));
root.render(E(AppWrapper, null));
</script>
</body>
</html>
