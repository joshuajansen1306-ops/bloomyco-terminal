<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Bloomyco.in</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<style>
  :root {
    --bg: #000000;
    --panel: #0a0a0a;
    --border: #2a2a2a;
    --amber: #ff9900;
    --green: #00ff66;
    --red: #ff3b3b;
    --cyan: #00e5ff;
    --text: #d8d8d8;
    --dim: #6b6b6b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); overflow-x: hidden; }
  body {
    font-family: "IBM Plex Mono", "Consolas", "Courier New", monospace;
    color: var(--text);
    font-size: 13px;
    line-height: 1.4;
  }
  #root { min-height: 100vh; }

  .terminal {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
    max-width: 100vw;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--amber);
    color: #000;
    padding: 4px 10px;
    font-weight: 700;
    letter-spacing: 1px;
    font-size: 12px;
  }
  .topbar .clock { font-weight: 700; }
  .topbar-brand { display: flex; align-items: center; gap: 8px; }
  .site-logo { height: 22px; width: auto; display: block; }

  .cmdbar {
    display: flex;
    gap: 6px;
    align-items: center;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 6px 10px;
  }
  .cmdbar input {
    flex: 1;
    background: #000;
    border: 1px solid var(--border);
    color: var(--green);
    font-family: inherit;
    font-size: 13px;
    padding: 4px 8px;
    outline: none;
  }
  .cmdbar input::placeholder { color: var(--dim); }
  .cmdbar .label { color: var(--amber); font-weight: 700; }

  .body {
    flex: 1;
    display: grid;
    grid-template-columns: 1.2fr 1fr 280px;
    grid-template-rows: auto 1fr;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  .panel {
    background: var(--panel);
    padding: 8px 10px;
    overflow: auto;
  }
  .panel h2 {
    margin: 0 0 8px 0;
    font-size: 12px;
    color: var(--amber);
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .tab {
    cursor: pointer;
    padding: 4px 12px;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--dim);
    border: 1px solid var(--border);
  }
  .tab.active {
    color: #000;
    background: var(--amber);
    border-color: var(--amber);
    font-weight: 700;
  }

  .indices-bar {
    display: flex;
    gap: 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 5px 10px;
    overflow-x: auto;
    white-space: nowrap;
  }
  .idx-item { font-size: 11px; }
  .idx-item .idx-label { color: var(--dim); margin-right: 6px; }

  .index-blocks {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .index-card {
    border: 1px solid var(--border);
    background: #0e0d08;
    padding: 8px 10px;
    cursor: pointer;
  }
  .index-card.active {
    border-color: var(--amber);
    background: #1a1608;
  }
  .index-card .ic-label {
    color: var(--amber);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .index-card .ic-price {
    font-size: 18px;
    font-weight: 700;
    margin-top: 4px;
  }
  .index-card .ic-chg {
    font-size: 11px;
    margin-top: 2px;
  }
  .india-section-label {
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 1px;
    margin: 4px 0 6px;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar .panel { flex: 1; min-height: 0; }

  .news-list { display: flex; flex-direction: column; gap: 8px; }
  .news-item {
    display: block;
    text-decoration: none;
    padding: 6px 0;
    border-bottom: 1px solid #161616;
  }
  .news-item:hover .news-title { color: var(--amber); }
  .news-title { color: var(--text); font-size: 12px; line-height: 1.35; }
  .news-meta { color: var(--dim); font-size: 10px; margin-top: 3px; letter-spacing: 0.3px; }

  .heatmap-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }
  .heat-cell {
    padding: 8px 6px;
    font-size: 10px;
    color: #000;
    font-weight: 700;
  }
  .heat-cell .hc-name { display: block; font-size: 9px; opacity: 0.85; }
  .heat-cell .hc-chg { display: block; font-size: 12px; margin-top: 2px; }

  .pf-form {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
  }
  .pf-form select, .pf-form input {
    background: #000;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    padding: 3px 5px;
  }
  .pf-form select { flex: 1.4; }
  .pf-form input { flex: 1; min-width: 0; }
  .pf-form button {
    background: var(--amber);
    color: #000;
    border: none;
    font-weight: 700;
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
  }
  .pf-list { font-size: 11px; }
  .pf-list .pf-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #161616; align-items: center; }
  .pf-list .pf-rm { color: var(--dim); cursor: pointer; margin-left: 6px; }
  .pf-total { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 12px; }

  .acct-summary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .acct-cell .k { color: var(--dim); font-size: 9px; text-transform: uppercase; }
  .acct-cell .v { font-size: 13px; font-weight: 700; margin-top: 2px; }

  .trade-form { margin-bottom: 10px; }
  .trade-asset { font-size: 11px; margin-bottom: 6px; color: var(--dim); }
  .trade-kind-tabs { display: flex; gap: 2px; margin-bottom: 6px; }
  .trade-row {
    display: flex;
    gap: 4px;
    margin-bottom: 6px;
  }
  .trade-row select, .trade-row input {
    background: #000;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    padding: 3px 5px;
    flex: 1;
    min-width: 0;
  }
  .trade-row button {
    background: var(--amber);
    color: #000;
    border: none;
    font-weight: 700;
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
    flex: 1.2;
  }
  .trade-row button.trade-sell-btn { background: var(--red); color: #fff; }
  .trade-error { color: var(--red); font-size: 10px; margin-top: 4px; }

  .pos-row { padding: 6px 0; border-bottom: 1px solid #161616; font-size: 11px; }
  .pos-row-bottom { display: flex; justify-content: flex-end; align-items: center; margin-top: 3px; }
  .pos-kind {
    font-size: 9px;
    font-weight: 700;
    color: #000;
    background: var(--dim);
    padding: 1px 4px;
  }

  .ticker-tape {
    grid-column: 1 / -1;
    background: var(--panel);
    white-space: nowrap;
    overflow: hidden;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .ticker-track {
    display: inline-block;
    animation: scroll 30s linear infinite;
  }
  .ticker-item { display: inline-block; padding: 0 24px; font-size: 13px; }
  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    color: var(--dim);
    font-weight: 400;
    font-size: 11px;
    text-transform: uppercase;
    padding: 4px 6px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 5px 6px;
    border-bottom: 1px solid #161616;
    font-size: 13px;
  }
  tr:hover td { background: #141414; cursor: pointer; }
  tr.selected td { background: #1a1a1a; }

  .up { color: var(--green); }
  .down { color: var(--red); }
  .mono-num { font-variant-numeric: tabular-nums; }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 14px;
    margin-bottom: 14px;
  }
  .detail-grid .k { color: var(--dim); font-size: 11px; text-transform: uppercase; }
  .detail-grid .v { font-size: 14px; }

  .chart-wrap { margin-top: 10px; }
  .chart-wrap svg { width: 100%; height: 160px; display: block; }

  .chart-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 4px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chart-controls-group {
    display: flex;
    gap: 2px;
  }
  .chart-toggle {
    cursor: pointer;
    padding: 3px 8px;
    font-size: 10px;
    letter-spacing: 0.5px;
    color: var(--dim);
    border: 1px solid var(--border);
  }
  .chart-toggle.active {
    color: #000;
    background: var(--amber);
    border-color: var(--amber);
    font-weight: 700;
  }

  .sentiment-box {
    margin-top: 16px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .sentiment-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px 10px;
    margin-bottom: 10px;
  }
  .sentiment-cell .k { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
  .sentiment-cell .v { font-size: 13px; margin-top: 2px; font-weight: 700; }
  .range-bar-wrap { margin: 8px 0 4px; }
  .range-bar {
    position: relative;
    height: 6px;
    background: linear-gradient(to right, var(--red), var(--dim), var(--green));
    border-radius: 3px;
  }
  .range-bar-fill { display: none; }
  .range-bar-marker {
    position: absolute;
    top: -3px;
    width: 2px;
    height: 12px;
    background: #fff;
    transform: translateX(-1px);
  }
  .range-bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--dim);
    margin-top: 3px;
  }
  .sentiment-disclaimer {
    font-size: 9px;
    color: var(--dim);
    margin-top: 8px;
    font-style: italic;
  }

  .statusbar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 4px 10px;
    display: flex;
    justify-content: space-between;
    color: var(--dim);
    font-size: 11px;
  }
  .statusbar .ok { color: var(--green); }
  .statusbar .err { color: var(--red); }

  .price-big { font-size: 26px; font-weight: 700; }

  .empty {
    color: var(--dim);
    padding: 20px 0;
    text-align: center;
  }

  /* market status badge */
  .mkt-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border: 1px solid currentColor;
    margin-left: 8px;
  }
  .mkt-badge.open  { color: var(--green); border-color: var(--green); }
  .mkt-badge.closed { color: var(--red);   border-color: var(--red); }
  .mkt-badge.pre   { color: var(--amber);  border-color: var(--amber); }
  .mkt-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .mkt-badge.closed .mkt-dot { animation: none; }

  /* market summary */
  .summary-bar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 10px 14px;
  }
  .summary-bar h2 { margin: 0 0 8px; font-size: 11px; color: var(--amber); letter-spacing: 1px; }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px 20px;
  }
  .summary-col { border-left: 2px solid var(--border); padding-left: 10px; }
  .summary-col h3 { margin: 0 0 5px; font-size: 10px; color: var(--dim); letter-spacing: 0.5px; }
  .summary-stat { font-size: 11px; margin-bottom: 2px; }
  .summary-text { font-size: 11px; color: var(--dim); margin-top: 6px; line-height: 1.5; border-top: 1px solid var(--border); padding-top: 6px; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; }

  /* CMD bar dropdown */
  .cmd-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #0e0e0e;
    border: 1px solid var(--amber);
    border-top: none;
    z-index: 1000;
    max-height: 300px;
    overflow-y: auto;
  }
  .cmd-suggestion {
    padding: 7px 12px;
    cursor: pointer;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cmd-suggestion:hover { background: #1a1a0a; }
  .cmd-sug-type {
    color: #000;
    background: var(--amber);
    font-size: 9px;
    font-weight: 700;
    padding: 1px 4px;
    letter-spacing: 0.5px;
    min-width: 44px;
    text-align: center;
  }
  .cmd-sug-label { color: var(--cyan); font-weight: 700; min-width: 80px; }
  .cmd-sug-name { color: var(--dim); font-size: 11px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cmd-hint { color: var(--dim); font-size: 10px; padding: 6px 12px; font-style: italic; }

  /* ── LOGIN SCREEN ────────────────────────────────────────────────────────── */
  .login-screen {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 20px;
  }
  .login-box {
    background: #0a0a0a;
    border: 1px solid var(--amber);
    padding: 36px 32px 28px;
    width: 100%;
    max-width: 400px;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .login-logo h1 {
    color: var(--amber);
    font-size: 20px;
    letter-spacing: 4px;
    margin: 12px 0 5px;
    font-family: inherit;
  }
  .login-subtitle {
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 2px;
    margin: 0;
  }
  .login-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 0 24px;
  }
  .login-field {
    margin-bottom: 16px;
  }
  .login-field label {
    display: block;
    color: var(--amber);
    font-size: 10px;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .login-field input {
    width: 100%;
    background: #000;
    border: 1px solid var(--border);
    color: var(--green);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .login-field input:focus { border-color: var(--amber); }
  .login-field input::placeholder { color: var(--dim); }
  .login-error {
    color: var(--red);
    font-size: 11px;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .login-btn {
    width: 100%;
    background: var(--amber);
    color: #000;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 13px;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.85; }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-note {
    color: var(--dim);
    font-size: 10px;
    text-align: center;
    margin: 20px 0 0;
    letter-spacing: 0.5px;
    line-height: 1.6;
  }
  .login-ticker {
    font-size: 28px;
    margin-bottom: 4px;
  }
  .login-socials {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .login-social-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--dim);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    transition: color 0.2s, border-color 0.2s;
  }
  .login-social-btn:hover { color: var(--amber); border-color: var(--amber); }
  .login-social-btn svg { width: 13px; height: 13px; fill: currentColor; }

  /* ── RESPONSIVE / CROSS-DEVICE ───────────────────────────────────────────── */

  /* Base touch improvements (all devices) */
  * { -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  .panel, .sidebar, .indices-bar, .tabs {
    -webkit-overflow-scrolling: touch;
  }

  /* Safe area padding for notched phones (iPhone X+) */
  .topbar {
    padding-left: max(10px, env(safe-area-inset-left));
    padding-right: max(10px, env(safe-area-inset-right));
  }
  .statusbar {
    padding-bottom: max(4px, env(safe-area-inset-bottom));
  }

  /* ── TABLET (iPad, Android tablet) — 768px to 1100px ── */
  @media (max-width: 1100px) and (min-width: 641px) {
    /* 2-column layout: main + sidebar */
    .body {
      grid-template-columns: 1fr 300px;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    /* Ticker spans both columns */
    .ticker-tape { grid-column: 1 / -1; }

    .index-blocks { grid-template-columns: 1fr 1fr; }
    .sentiment-grid { grid-template-columns: 1fr 1fr; }
    .summary-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .acct-summary { grid-template-columns: 1fr 1fr; }

    .price-big { font-size: 22px; }
    .chart-wrap svg { height: 190px; }
    .tab { padding: 5px 12px; }
  }

  /* iPad portrait specifically */
  @media (min-width: 768px) and (max-width: 820px) {
    .body { grid-template-columns: 1fr; overflow: visible; }
    .terminal { height: auto; min-height: 100dvh; }
    .sidebar { overflow: visible; }
    .sidebar .panel { flex: none; min-height: auto; }
  }

  /* ── MOBILE (phones ≤ 640px) ── */
  @media (max-width: 640px) {
    body { font-size: 12px; }

    /* Fix iOS 100vh / address bar */
    .terminal { height: auto; min-height: 100dvh; }

    /* Topbar */
    .topbar { padding: 6px 10px; font-size: 11px; flex-wrap: nowrap; width: 100%; }
    .site-logo { height: 18px; }
    .topbar .clock { font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }

    /* CMD bar — 16px prevents iOS auto-zoom */
    .cmdbar { padding: 6px 10px; }
    .cmdbar input { font-size: 16px; padding: 8px 10px; }
    .cmdbar .label { font-size: 11px; }

    /* Single column stacked layout */
    .body {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
      height: auto;
      overflow: visible;
    }
    .panel { overflow: visible; }
    .sidebar { overflow: visible; }
    .sidebar .panel { flex: none; min-height: auto; }

    /* Ticker */
    .ticker-tape { padding: 6px 0; }
    .ticker-item { font-size: 12px; padding: 0 16px; }

    /* Tabs — horizontal scroll, no wrap */
    .tabs { overflow-x: auto; flex-wrap: nowrap; gap: 4px; padding-bottom: 2px; -ms-overflow-style: none; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { white-space: nowrap; padding: 8px 14px; font-size: 12px; flex-shrink: 0; min-height: 36px; }

    /* Indices bar */
    .indices-bar { gap: 14px; padding: 6px 10px; }
    .idx-item { font-size: 12px; }

    /* Index cards */
    .index-blocks { grid-template-columns: 1fr 1fr; gap: 6px; }
    .index-card { padding: 8px; }
    .index-card .ic-price { font-size: 14px; }
    .index-card .ic-label { font-size: 10px; }

    /* Price display */
    .price-big { font-size: 22px; }

    /* Detail grid */
    .detail-grid { grid-template-columns: 1fr 1fr; gap: 5px 8px; }
    .detail-grid .v { font-size: 13px; }

    /* Chart */
    .chart-wrap svg { height: 220px; }
    .chart-controls { gap: 6px; }
    .chart-controls-group { flex-wrap: wrap; }
    .chart-toggle { padding: 6px 10px; font-size: 11px; min-height: 32px; }

    /* Sentiment */
    .sentiment-grid { grid-template-columns: 1fr 1fr; gap: 6px 8px; }

    /* Market summary */
    .summary-bar { padding: 10px; }
    .summary-grid { grid-template-columns: 1fr 1fr; gap: 10px 8px; }
    .summary-col { padding-left: 8px; }
    .summary-stat { font-size: 11px; }
    .summary-text { font-size: 10px; }

    /* Tables — horizontal scroll */
    .panel > table, table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* Heatmap */
    .heatmap-grid { grid-template-columns: 1fr 1fr; }

    /* Account */
    .acct-summary { grid-template-columns: 1fr 1fr; }

    /* Portfolio form */

function fmtInr(n, decimals) {
  if (n === undefined || n === null) return "--";
  const d = decimals !== undefined ? decimals : 2;
  return n.toLocaleString("en-IN", { minimumFractionDigits: d, maximumFractionDigits: d });
}

function fmtUsd(n, decimals) {
  if (n === undefined || n === null) return "--";
  const d = decimals !== undefined ? decimals : (n < 1 ? 4 : 2);
  return n.toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d });
}

function fmtCcy(n, currency) {
  if (n === undefined || n === null) return "--";
  const num = n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return currency ? currency + " " + num : num;
}

function extractYahooOhlc(chartJson) {
  const result = chartJson.chart && chartJson.chart.result && chartJson.chart.result[0];
  const q = result && result.indicators && result.indicators.quote && result.indicators.quote[0];
  if (!q) return [];
  const n = (q.close || []).length;
  const ohlc = [];
  for (let i = 0; i < n; i++) {
    const o = q.open && q.open[i], h = q.high && q.high[i], l = q.low && q.low[i], c = q.close && q.close[i];
    if (o === null || o === undefined || h === null || h === undefined ||
        l === null || l === undefined || c === null || c === undefined) continue;
    ohlc.push({ open: o, high: h, low: l, close: c });
  }
  return ohlc;
}

function timeAgo(unixSeconds) {
  const diffMs = Date.now() - unixSeconds * 1000;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return mins + "m ago";
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + "h ago";
  const days = Math.floor(hours / 24);
  return days + "d ago";
}

function fmtCompact(n) {
  if (n === undefined || n === null) return "--";
  if (n >= 1e12) return (n / 1e12).toFixed(2) + "T";
  if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
  if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
  return n.toLocaleString("en-US");
}

function Candlestick({ ohlc }) {
  if (!ohlc || ohlc.length < 2) {
    return E("div", { className: "empty" }, "NO CHART DATA");
  }
  const w = 600, h = 160, pad = 4;
  const highs = ohlc.map((c) => c.high);
  const lows = ohlc.map((c) => c.low);
  const min = Math.min(...lows);
  const max = Math.max(...highs);
  const range = max - min || 1;
  const n = ohlc.length;
  const slot = (w - pad * 2) / n;
  const candleW = Math.max(1, slot * 0.6);
  const y = (v) => h - pad - ((v - min) / range) * (h - pad * 2);
  const candles = ohlc.map((c, i) => {
    const x = pad + i * slot + slot / 2;
    const up = c.close >= c.open;
    const color = up ? "var(--green)" : "var(--red)";
    const bodyTop = y(Math.max(c.open, c.close));
    const bodyBottom = y(Math.min(c.open, c.close));
    const bodyHeight = Math.max(1, bodyBottom - bodyTop);
    return E("g", { key: i },
      E("line", { x1: x, x2: x, y1: y(c.high), y2: y(c.low), stroke: color, strokeWidth: "1" }),
      E("rect", { x: x - candleW / 2, y: bodyTop, width: candleW, height: bodyHeight, fill: color })
    );
  });
  return E("svg", { viewBox: `0 0 ${w} ${h}`, preserveAspectRatio: "none" }, candles);
}

function Chart({ chartType, ohlc }) {
  if (chartType === "candles") {
    return E(Candlestick, { ohlc });
  }
  const points = ohlc ? ohlc.map((c) => c.close) : null;

}

function computeSentiment({ price, fiftyTwoWeekHigh, fiftyTwoWeekLow, ohlc }) {
  let trendPct = null;
  let volatilityLabel = null;
  let dailyVolPct = null;
  if (ohlc && ohlc.length >= 2) {
    const first = ohlc[0].close;
    const last = ohlc[ohlc.length - 1].close;
    if (first) trendPct = ((last - first) / first) * 100;

    const dailyMoves = [];
    for (let i = 1; i < ohlc.length; i++) {
      const prev = ohlc[i - 1].close;
      if (prev) dailyMoves.push(((ohlc[i].close - prev) / prev) * 100);
    }
    if (dailyMoves.length > 0) {
      const mean = dailyMoves.reduce((a, b) => a + b, 0) / dailyMoves.length;
      const variance = dailyMoves.reduce((a, b) => a + (b - mean) * (b - mean), 0) / dailyMoves.length;
      const stdev = Math.sqrt(variance);
      dailyVolPct = stdev;
      volatilityLabel = stdev < 1 ? "LOW" : stdev < 3 ? "MODERATE" : "HIGH";
    }
  }

  let rangePosition = null;
  if (
    price !== undefined && price !== null &&
    fiftyTwoWeekHigh !== undefined && fiftyTwoWeekHigh !== null &&
    fiftyTwoWeekLow !== undefined && fiftyTwoWeekLow !== null &&
    fiftyTwoWeekHigh !== fiftyTwoWeekLow
  ) {
    rangePosition = ((price - fiftyTwoWeekLow) / (fiftyTwoWeekHigh - fiftyTwoWeekLow)) * 100;
  }

  let momentumLabel = "NEUTRAL";
  if (trendPct !== null) {
    momentumLabel = trendPct > 2 ? "BULLISH" : trendPct < -2 ? "BEARISH" : "NEUTRAL";
  }

  return { trendPct, volatilityLabel, dailyVolPct, rangePosition, momentumLabel };
}

function normCdf(x) {
  const t = 1 / (1 + 0.2316419 * Math.abs(x));
  const d = 0.3989423 * Math.exp((-x * x) / 2);
  let p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
  if (x >= 0) p = 1 - p;
  return p;
}

function bsPrice(S, K, T, sigma, r, type) {
  if (T <= 0 || sigma <= 0 || S <= 0 || K <= 0) {
    return type === "CALL" ? Math.max(S - K, 0) : Math.max(K - S, 0);
  }
  const d1 = (Math.log(S / K) + (r + (sigma * sigma) / 2) * T) / (sigma * Math.sqrt(T));
  const d2 = d1 - sigma * Math.sqrt(T);
  if (type === "CALL") {
    return S * normCdf(d1) - K * Math.exp(-r * T) * normCdf(d2);
  }
  return K * Math.exp(-r * T) * normCdf(-d2) - S * normCdf(-d1);
}

function Sparkline({ points }) {
  if (!points || points.length < 2) {
    return E("div", { className: "empty" }, "NO CHART DATA");
  }
  const w = 600, h = 150, pad = 4;
  const min = Math.min(...points);
  const max = Math.max(...points);
  const range = max - min || 1;
  const stepX = (w - pad * 2) / (points.length - 1);
  const coords = points.map((p, i) => {
    const x = pad + i * stepX;
    const y = h - pad - ((p - min) / range) * (h - pad * 2);
    return [x, y];
  });
  const d = coords.map((c, i) => (i === 0 ? "M" : "L") + c[0].toFixed(1) + "," + c[1].toFixed(1)).join(" ");
  const last = points[points.length - 1];
  const first = points[0];
  const color = last >= first ? "var(--green)" : "var(--red)";
  const areaD = d + ` L${coords[coords.length - 1][0].toFixed(1)},${h} L${coords[0][0].toFixed(1)},${h} Z`;
  return E(
    "svg",
    { viewBox: `0 0 ${w} ${h}`, preserveAspectRatio: "none" },
    E("path", { d: areaD, fill: color, opacity: "0.08", stroke: "none" }),
    E("path", { d: d, fill: "none", stroke: color, strokeWidth: "1.5" })
  );
}

function fmtCountdown(secs) {
  if (secs == null || secs <= 0) return null;
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  if (h > 0) return h + "h " + m + "m";
  if (m > 0) return m + "m " + s + "s";
  return s + "s";
}

function MarketBadge({ status }) {
  const [now, setNow] = useState(Math.floor(Date.now() / 1000));
  useEffect(() => {
    const t = setInterval(() => setNow(Math.floor(Date.now() / 1000)), 1000);
    return () => clearInterval(t);
  }, []);
  if (!status) return null;
  const cls = status.open ? "open" : status.pre ? "pre" : "closed";
  const label = status.open ? "LIVE" : status.pre ? "PRE-MKT" : "CLOSED";
  const countdown = status.open
    ? fmtCountdown(status.closeAt - now)
    : fmtCountdown(status.openAt - now);
  const countdownLabel = status.open && countdown
    ? " · closes in " + countdown
    : !status.open && countdown
      ? " · opens in " + countdown
      : null;
  return E("span", { className: "mkt-badge " + cls },
    E("span", { className: "mkt-dot" }),
    label + (status.exchange ? " · " + status.exchange : ""),
    countdownLabel
  );
}

function MarketSummaryBar({ india, stocks, coins, global }) {
  const indiaStocks = india.filter(s => !s.isIndex && !s.error && s.changePct != null);
  const intlStocks  = stocks.filter(s => !s.isIndex && !s.error && s.changePct != null);
  const indiaIndices = india.filter(s => s.isIndex && !s.error && s.changePct != null);
  const intlIndices  = stocks.filter(s => s.isIndex && !s.error && s.changePct != null);

  const summarise = (list) => {
    if (!list.length) return null;
    const gainers = list.filter(s => s.changePct > 0).length;
    const losers  = list.filter(s => s.changePct < 0).length;
    const best  = list.reduce((a, b) => b.changePct > a.changePct ? b : a, list[0]);
    const worst = list.reduce((a, b) => b.changePct < a.changePct ? b : a, list[0]);
    const mood = gainers > losers * 1.5 ? "BULLISH" : losers > gainers * 1.5 ? "BEARISH" : "MIXED";
    return { gainers, losers, best, worst, mood, total: list.length };
  };

  const indiaSummary = summarise(indiaStocks);
  const intlSummary  = summarise(intlStocks);
  const cryptoList   = coins.filter(c => c.price_change_percentage_24h != null);
  const cryptoUp     = cryptoList.filter(c => c.price_change_percentage_24h > 0).length;
  const btc          = coins.find(c => c.id === "bitcoin");
  const eth          = coins.find(c => c.id === "ethereum");

  const moodColor = (mood) => mood === "BULLISH" ? "var(--green)" : mood === "BEARISH" ? "var(--red)" : "var(--amber)";

  const buildNarrative = () => {
    const parts = [];
    if (indiaSummary) {
      parts.push(`Indian markets are ${indiaSummary.mood.toLowerCase()} — ${indiaSummary.gainers}/${indiaSummary.total} stocks advancing. Best: ${indiaSummary.best.label} (${indiaSummary.best.changePct >= 0 ? "+" : ""}${indiaSummary.best.changePct.toFixed(2)}%), Worst: ${indiaSummary.worst.label} (${indiaSummary.worst.changePct.toFixed(2)}%).`);
    }
    if (intlSummary) {
      parts.push(`Global equities ${intlSummary.mood.toLowerCase()} — ${intlSummary.gainers}/${intlSummary.total} names higher. Top: ${intlSummary.best.label} (${intlSummary.best.changePct >= 0 ? "+" : ""}${intlSummary.best.changePct.toFixed(2)}%).`);
    }
    const nifty = indiaIndices.find(s => s.label === "NIFTY 50");
    const sp500 = intlIndices.find(s => s.label === "S&P 500");
    if (nifty) parts.push(`Nifty 50 ${nifty.changePct >= 0 ? "▲" : "▼"} ${Math.abs(nifty.changePct).toFixed(2)}%.`);
    if (sp500) parts.push(`S&P 500 ${sp500.changePct >= 0 ? "▲" : "▼"} ${Math.abs(sp500.changePct).toFixed(2)}%.`);
    if (btc) parts.push(`BTC ${btc.price_change_percentage_24h >= 0 ? "▲" : "▼"} ${Math.abs(btc.price_change_percentage_24h).toFixed(2)}% to $${fmtUsd(btc.current_price)}.`);
    return parts.join("  ·  ");
  };

  const narrative = buildNarrative();

        indiaSummary
          ? E("div", null,

              E("div", { className: "summary-stat up" }, "▲ " + indiaSummary.gainers + " advancing"),

              E("div", { className: "summary-stat", style: { marginTop: 4 } },
                E("span", { className: "up" }, "TOP: " + indiaSummary.best.label + " +" + indiaSummary.best.changePct.toFixed(2) + "%")

    if (!query.trim()) return;
    setSearchLoading(true);
    setSearchError(null);
    setSelectedSearchResult(null);
    setSearchQuote(null);
    setSearchChartData(null);
    try {
      const trimmed = query.trim();
      const looksLikeTicker = /^[A-Za-z0-9.&-]{1,15}$/.test(trimmed) && !trimmed.includes(" ");
      const directCandidates = looksLikeTicker
        ? [trimmed.toUpperCase(), trimmed.toUpperCase() + ".NS", trimmed.toUpperCase() + ".BO"]
        : [];

      const [searchRes, ...directResults] = await Promise.all([
        fetch(`${LOCAL_PROXY_BASE}/api/yahoo-search?q=${encodeURIComponent(query)}&quotesCount=40`),
        ...directCandidates.map((sym) =>
          fetch(`${LOCAL_PROXY_BASE}/api/yahoo?symbol=${encodeURIComponent(sym)}`)
            .then((r) => (r.ok ? r.json() : null))
            .then((data) => {
              const result = data && data.chart && data.chart.result && data.chart.result[0];
              if (!result || !result.meta || !result.meta.regularMarketPrice) return null;
              const m = result.meta;
              return {
                symbol: m.symbol || sym,
                shortname: m.shortName,
                longname: m.longName,
                exchange: m.exchangeName,
                exchDisp: m.fullExchangeName,
                quoteType: m.instrumentType || "EQUITY"
              };
            })
            .catch(() => null)
        )
      ]);

      if (!searchRes.ok) throw new Error("HTTP " + searchRes.status);
      const data = await searchRes.json();
      const quotes = (data.quotes || []).filter((q) => q.symbol);

      const seen = new Set(quotes.map((q) => q.symbol));
      directResults.filter(Boolean).forEach((d) => {
        if (!seen.has(d.symbol)) {
          quotes.unshift(d);
          seen.add(d.symbol);
        }
      });

      const rank = (q) => {
        const isIndia = q.exchange === "NSI" || q.exchange === "BSE";
        const isEquityLike = q.quoteType === "EQUITY" || q.quoteType === "ETF" || q.quoteType === "INDEX";
        if (directCandidates.includes(q.symbol)) return -1;
        if (isIndia && q.quoteType === "EQUITY") return 0;
        if (isEquityLike) return 1;
        return 2;
      };
      quotes.sort((a, b) => rank(a) - rank(b));
      setSearchResults(quotes);
    } catch (e) {
      setSearchError(e.message || "search failed");
      setSearchResults([]);
    } finally {
      setSearchLoading(false);
    }
  }, []);

    const asset = getCurrentTradableAsset();
    if (!asset) {

      return;
    }
    const qty = parseFloat(tradeQty);
    if (!qty || qty <= 0) {
      setTradeError("Enter a valid quantity.");
      return;
    }
    const fx = fxToInr(asset.currency, fxRates);
    if (fx === null) {
      setTradeError("FX rate unavailable for " + asset.currency + " — try again shortly.");
      return;
    }

    if (tradeKind === "SPOT") {
      const costInr = qty * asset.price * fx;
      if (costInr > cashInr) {
        setTradeError("Insufficient virtual cash for this order.");
        return;
      }
      setCashInr((c) => c - costInr);
      setPositions((p) => {
        const existing = p.find((x) => x.kind === "SPOT" && x.source === asset.source && x.sourceId === asset.sourceId);
        if (existing) {
          const newQty = existing.qty + qty;
          const newCostBasisInr = existing.entryPrice * existing.entryFx * existing.qty + asset.price * fx * qty;
          const blendedEntryPrice = newCostBasisInr / fx / newQty;
          return p.map((x) => x.id === existing.id
            ? { ...x, qty: newQty, entryPrice: blendedEntryPrice, entryFx: fx }
            : x
          );
        }
        return [...p, {
          id: Date.now() + Math.random(), kind: "SPOT", side: "LONG",
          source: asset.source, sourceId: asset.sourceId, label: asset.label, name: asset.name,
          currency: asset.currency, qty, entryPrice: asset.price, entryFx: fx, openedAt: Date.now()
        }];
      });
      setTradeQty("");
    } else if (tradeKind === "FUTURE") {
      const leverage = tradeLeverage || 1;
      const marginInr = (qty * asset.price * fx) / leverage;
      if (marginInr > cashInr) {
        setTradeError("Insufficient virtual margin for this order.");
        return;
      }
      setCashInr((c) => c - marginInr);
      setPositions((p) => [...p, {
        id: Date.now() + Math.random(), kind: "FUTURE", side: tradeSide,
        source: asset.source, sourceId: asset.sourceId, label: asset.label, name: asset.name,
        currency: asset.currency, qty, entryPrice: asset.price, entryFx: fx,
        leverage, marginInr, openedAt: Date.now()
      }]);
      setTradeQty("");
    } else if (tradeKind === "OPTION") {
      const strike = parseFloat(tradeStrike);
      if (!strike || strike <= 0) {
        setTradeError("Enter a valid strike price.");
        return;
      }
      const sentiment = computeSentiment({ price: asset.price, ohlc: asset.ohlc });
      const dailyVol = sentiment.dailyVolPct;
      if (dailyVol === null || dailyVol === undefined) {
        setTradeError("Not enough chart history yet to price this option — wait a moment and retry.");
        return;
      }
      const sigma = (dailyVol / 100) * Math.sqrt(252);
      const T = tradeExpiryDays / 365;
      const premium = bsPrice(asset.price, strike, T, sigma, RISK_FREE_RATE, tradeOptionType);
      const costInr = premium * qty * fx;
      if (costInr <= 0 || !isFinite(costInr)) {
        setTradeError("Could not price this option — try a different strike or expiry.");
        return;
      }
      if (costInr > cashInr) {
        setTradeError("Insufficient virtual cash for this premium.");
        return;
      }
      setCashInr((c) => c - costInr);
      setPositions((p) => [...p, {
        id: Date.now() + Math.random(), kind: "OPTION", optionType: tradeOptionType,
        source: asset.source, sourceId: asset.sourceId, label: asset.label, name: asset.name,
        currency: asset.currency, qty, strike, entryPrice: premium, entryFx: fx,
        sigma, expiryDays: tradeExpiryDays, openedAt: Date.now()

    const S = getLivePrice(pos);

    if (S === null) return { value: null, pnl: null, pnlPct: null, label: "PRICE UNAVAILABLE" };

    if (pos.kind === "SPOT") {
      const value = S * pos.qty * fx;
      const cost = pos.entryPrice * pos.qty * pos.entryFx;
      const pnl = value - cost;
      return { value, pnl, pnlPct: cost ? (pnl / cost) * 100 : null, current: S };
    }
    if (pos.kind === "FUTURE") {
      const dirSign = pos.side === "LONG" ? 1 : -1;
      const pnlNative = (S - pos.entryPrice) * pos.qty * pos.leverage * dirSign;
      const pnl = pnlNative * fx;
      const value = pos.marginInr + pnl;
      return { value, pnl, pnlPct: pos.marginInr ? (pnl / pos.marginInr) * 100 : null, current: S, liquidated: pnl <= -pos.marginInr };
    }
    if (pos.kind === "OPTION") {
      const daysElapsed = (Date.now() - pos.openedAt) / 86400000;
      const tRemaining = Math.max(0, (pos.expiryDays - daysElapsed) / 365);
      const premiumNow = bsPrice(S, pos.strike, tRemaining, pos.sigma, RISK_FREE_RATE, pos.optionType);
      const value = premiumNow * pos.qty * fx;
      const cost = pos.entryPrice * pos.qty * pos.entryFx;
      const pnl = value - cost;
      return { value, pnl, pnlPct: cost ? (pnl / cost) * 100 : null, current: S, expired: tRemaining <= 0, premiumNow };

            E("div", null, E("div", { className: "k" }, "MARKET CAP"), E("div", { className: "v mono-num" }, "$" + fmtCompact(selectedCoin.market_cap))),
            E("div", null, E("div", { className: "k" }, "VOLUME 24H"), E("div", { className: "v mono-num" }, "$" + fmtCompact(selectedCoin.total_volume))),
            E("div", null, E("div", { className: "k" }, "CIRC SUPPLY"), E("div", { className: "v mono-num" }, fmtCompact(selectedCoin.circulating_supply))),
            E("div", null, E("div", { className: "k" }, "ATH"), E("div", { className: "v mono-num" }, "$" + fmtUsd(selectedCoin.ath)))
          ),
          E("h2", { style: { marginTop: 4 } }, "CHART"),
          chartError
            ? E("div", { className: "chart-wrap empty" }, chartError)
            : E("div", { className: "chart-wrap" }, E(Chart, { chartType, ohlc: chartData })),
          E(ChartControls, { chartType, setChartType, range: chartRange, setRange: setChartRange }),
          E(MarketSentiment, {
            price: selectedCoin.current_price,
            fiftyTwoWeekHigh: selectedCoin.ath,
            fiftyTwoWeekLow: selectedCoin.atl,
            ohlc: chartData,
            rangeLabel: "ALL-TIME RANGE POSITION",
            lowLabel: "ATL",
            highLabel: "ATH"
          })
        )
      : E("div", { className: "empty" }, "SELECT A SECURITY FROM THE WATCHLIST");
  } else if (tab === "stocks") {
    detailContent = selectedStockData && !selectedStockData.error
      ? E("div", null,
          E("div", { style: { marginBottom: 10 } },
            E("span", { style: { color: selectedStockData.isIndex ? "var(--amber)" : "var(--cyan)", fontSize: 16, fontWeight: 700 } }, selectedStockData.label),
            " ",
            E("span", { style: { color: "var(--dim)" } }, selectedStockData.name)
          ),
          E("div", { className: "price-big mono-num" },
            fmtCcy(selectedStockData.price, selectedStockData.currency),
            " ",
            E("span", { style: { fontSize: 15 }, className: selectedStockData.changePct >= 0 ? "up" : "down" },
              (selectedStockData.changePct >= 0 ? "▲ " : "▼ ") + Math.abs(selectedStockData.changePct || 0).toFixed(2) + "%")
          ),
          E("div", { className: "detail-grid", style: { marginTop: 14 } },
            E("div", null, E("div", { className: "k" }, "PREV CLOSE"), E("div", { className: "v mono-num" }, fmtCcy(selectedStockData.prevClose, selectedStockData.currency))),
            E("div", null, E("div", { className: "k" }, "CHANGE"), E("div", { className: "v mono-num " + (selectedStockData.change >= 0 ? "up" : "down") }, fmtCcy(selectedStockData.change, selectedStockData.currency))),
            E("div", null, E("div", { className: "k" }, "DAY HIGH"), E("div", { className: "v mono-num" }, fmtCcy(selectedStockData.high, selectedStockData.currency))),
            E("div", null, E("div", { className: "k" }, "DAY LOW"), E("div", { className: "v mono-num" }, fmtCcy(selectedStockData.low, selectedStockData.currency)))
          ),
          E("h2", { style: { marginTop: 4 } }, "CHART"),
          E("div", { className: "chart-wrap" }, E(Chart, { chartType, ohlc: stocksChartData })),
          E(ChartControls, { chartType, setChartType, range: chartRange, setRange: setChartRange }),
          E(MarketSentiment, {
            price: selectedStockData.price,
            fiftyTwoWeekHigh: selectedStockData.fiftyTwoWeekHigh,
            fiftyTwoWeekLow: selectedStockData.fiftyTwoWeekLow,
            ohlc: stocksChartData
          }),
          E(FundamentalsGrid, { d: selectedStockData, fundamentals, currency: selectedStockData.currency, isInr: false })
        )
      : E("div", { className: "empty" }, "SELECT A SECURITY FROM THE WATCHLIST");
  } else if (tab === "india") {
    detailContent = selectedIndiaData && !selectedIndiaData.error
      ? E("div", null,
          E("div", { style: { marginBottom: 10 } },
            E("span", { style: { color: selectedIndiaData.isIndex ? "var(--amber)" : "var(--cyan)", fontSize: 16, fontWeight: 700 } }, selectedIndiaData.label),
            " ",
            E("span", { style: { color: "var(--dim)" } }, selectedIndiaData.name)
          ),
          E("div", { className: "price-big mono-num" },
            "₹" + fmtInr(selectedIndiaData.price),
            " ",
            E("span", { style: { fontSize: 15 }, className: selectedIndiaData.changePct >= 0 ? "up" : "down" },
              (selectedIndiaData.changePct >= 0 ? "▲ " : "▼ ") + Math.abs(selectedIndiaData.changePct || 0).toFixed(2) + "%")
          ),
          E("div", { className: "detail-grid", style: { marginTop: 14 } },
            E("div", null, E("div", { className: "k" }, "PREV CLOSE"), E("div", { className: "v mono-num" }, "₹" + fmtInr(selectedIndiaData.prevClose))),
            E("div", null, E("div", { className: "k" }, "CHANGE"), E("div", { className: "v mono-num " + (selectedIndiaData.change >= 0 ? "up" : "down") }, "₹" + fmtInr(selectedIndiaData.change))),
            E("div", null, E("div", { className: "k" }, "DAY HIGH"), E("div", { className: "v mono-num" }, "₹" + fmtInr(selectedIndiaData.high))),
            E("div", null, E("div", { className: "k" }, "DAY LOW"), E("div", { className: "v mono-num" }, "₹" + fmtInr(selectedIndiaData.low)))
          ),
          E("h2", { style: { marginTop: 4 } }, "CHART"),
          E("div", { className: "chart-wrap" }, E(Chart, { chartType, ohlc: indiaChartData })),
          E(ChartControls, { chartType, setChartType, range: chartRange, setRange: setChartRange }),
          E(MarketSentiment, {
            price: selectedIndiaData.price,
            fiftyTwoWeekHigh: selectedIndiaData.fiftyTwoWeekHigh,
            fiftyTwoWeekLow: selectedIndiaData.fiftyTwoWeekLow,
            ohlc: indiaChartData
          }),
          E(FundamentalsGrid, { d: selectedIndiaData, fundamentals, currency: "INR", isInr: true })
        )
      : E("div", { className: "empty" }, "SELECT A SECURITY FROM THE WATCHLIST");
  } else {
    detailContent = !selectedSearchResult
      ? E("div", { className: "empty" }, "SEARCH AND SELECT A RESULT")
      : searchQuoteError
        ? E("div", { className: "empty" }, searchQuoteError)
        : !searchQuote
          ? E("div", { className: "empty" }, "LOADING...")
          : E("div", null,
              E("div", { style: { marginBottom: 10 } },
                E("span", { style: { color: "var(--cyan)", fontSize: 16, fontWeight: 700 } }, searchQuote.symbol),
                " ",
                E("span", { style: { color: "var(--dim)" } }, searchQuote.name + (searchQuote.exchange ? " — " + searchQuote.exchange : ""))
              ),
              E("div", { className: "price-big mono-num" },
                fmtCcy(searchQuote.price, searchQuote.currency),
                " ",
                E("span", { style: { fontSize: 15 }, className: searchQuote.changePct >= 0 ? "up" : "down" },
                  (searchQuote.changePct >= 0 ? "▲ " : "▼ ") + Math.abs(searchQuote.changePct || 0).toFixed(2) + "%")
              ),
              E("div", { className: "detail-grid", style: { marginTop: 14 } },
                E("div", null, E("div", { className: "k" }, "PREV CLOSE"), E("div", { className: "v mono-num" }, fmtCcy(searchQuote.prevClose, searchQuote.currency))),
                E("div", null, E("div", { className: "k" }, "CHANGE"), E("div", { className: "v mono-num " + (searchQuote.change >= 0 ? "up" : "down") }, fmtCcy(searchQuote.change, searchQuote.currency))),
                E("div", null, E("div", { className: "k" }, "DAY HIGH"), E("div", { className: "v mono-num" }, fmtCcy(searchQuote.high, searchQuote.currency))),
                E("div", null, E("div", { className: "k" }, "DAY LOW"), E("div", { className: "v mono-num" }, fmtCcy(searchQuote.low, searchQuote.currency))),
                E("div", null, E("div", { className: "k" }, "52W HIGH"), E("div", { className: "v mono-num" }, fmtCcy(searchQuote.fiftyTwoWeekHigh, searchQuote.currency))),
                E("div", null, E("div", { className: "k" }, "52W LOW"), E("div", { className: "v mono-num" }, fmtCcy(searchQuote.fiftyTwoWeekLow, searchQuote.currency)))
              ),
              E("h2", { style: { marginTop: 4 } }, "CHART"),
              E("div", { className: "chart-wrap" }, E(Chart, { chartType, ohlc: searchChartData })),
              E(ChartControls, { chartType, setChartType, range: chartRange, setRange: setChartRange }),
              E(MarketSentiment, {
                price: searchQuote.price,
                fiftyTwoWeekHigh: searchQuote.fiftyTwoWeekHigh,
                fiftyTwoWeekLow: searchQuote.fiftyTwoWeekLow,
                ohlc: searchChartData
              }),
              E(FundamentalsGrid, { d: searchQuote, fundamentals, currency: searchQuote.currency, isInr: false })
            );
  }

  const detailPanelEl = E("div", { className: "panel" },
    E("h2", { style: { display: "flex", alignItems: "center" } },
      "SECURITY DETAIL",
      E(MarketBadge, { status: marketStatus })
    ),
    detailContent
  );

  const newsContent = newsLoading
    ? E("div", { className: "empty" }, "LOADING NEWS...")
    : newsError
      ? E("div", { className: "empty" }, newsError)
      : news.length === 0
        ? E("div", { className: "empty" }, "NO NEWS FOUND")
        : E("div", { className: "news-list" },
            news.map((n, i) =>
              E("a", {
                key: n.uuid || i,
                className: "news-item",
                href: n.link,
                target: "_blank",
                rel: "noopener noreferrer"
              },
                E("div", { className: "news-title" }, n.title),
                E("div", { className: "news-meta" },
                  (n.publisher || "") + (n.providerPublishTime ? " — " + timeAgo(n.providerPublishTime) : "")
                )
              )
            )
          );

  const newsPanelEl = E("div", { className: "panel", style: { flex: "1 1 0" } },
    E("h2", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
      E("span", null, "MARKET NEWS" + (newsQuery && newsQuery !== "stock market" ? " — " + newsQuery.toUpperCase() : "")),
      E("span", { style: { display: "flex", alignItems: "center", gap: 8 } },
        newsLastFetch
          ? E("span", { style: { color: "var(--dim)", fontSize: 9, fontWeight: 400 } },
              "UPDATED " + newsLastFetch.toLocaleTimeString()
            )
          : null,
        E("span", {
          style: { cursor: "pointer", color: "var(--amber)", fontSize: 10, fontWeight: 700, border: "1px solid var(--amber)", padding: "1px 6px" },
          onClick: () => fetchNews(newsQuery, newsFallback, newsTickerFilter),
          title: "Refresh news"
        }, newsLoading ? "..." : "↻ REFRESH")
      )
    ),
    newsContent
  );

  const heatmapPanelEl = E("div", { className: "panel", style: { flex: "1 1 0" } },
    E("h2", null, "SECTOR HEATMAP — 24H"),
    categoriesLoading
      ? E("div", { className: "empty" }, "LOADING...")
      : categoriesError
        ? E("div", { className: "empty" }, categoriesError)
        : categories.length === 0
          ? E("div", { className: "empty" }, "NO DATA AVAILABLE")
          : E("div", { className: "heatmap-grid" },
              categories.map((cat) => {
                const chg = cat.market_cap_change_24h || 0;
                const intensity = Math.min(Math.abs(chg) / 3, 1);
                const bg = chg >= 0
                  ? `rgba(0,255,102,${0.2 + intensity * 0.6})`
                  : `rgba(255,59,59,${0.2 + intensity * 0.6})`;
                return E("div", { key: cat.id, className: "heat-cell", style: { background: bg } },
                  E("span", { className: "hc-name" }, cat.name),
                  E("span", { className: "hc-chg" }, (chg >= 0 ? "+" : "") + chg.toFixed(2) + "%")
                );
              })
            )
  );

  const tradeFormEl = !currentAssetForTrade
    ? E("div", { className: "empty" }, "SELECT A SECURITY IN CRYPTO, INTERNATIONAL STOCKS, OR INDIA TO TRADE")
    : E("div", { className: "trade-form" },
        E("div", { className: "trade-asset" },
          "TRADING: ",
          E("span", { style: { color: "var(--cyan)" } }, currentAssetForTrade.label),
          " @ ",
          E("span", { className: "mono-num" }, fmtCcy(currentAssetForTrade.price, currentAssetForTrade.currency))
        ),
        E("div", { className: "trade-kind-tabs" },
          ["SPOT", "FUTURE", "OPTION"].map((k) =>
            E("span", {
              key: k,
              className: "chart-toggle" + (tradeKind === k ? " active" : ""),
              onClick: () => { setTradeKind(k); setTradeError(null); }
            }, k)
          )
        ),
        tradeKind === "FUTURE"
          ? E("div", { className: "trade-row" },
              E("select", { value: tradeSide, onChange: (e) => setTradeSide(e.target.value) },
                E("option", { value: "LONG" }, "LONG"),
                E("option", { value: "SHORT" }, "SHORT")
              ),
              E("select", { value: tradeLeverage, onChange: (e) => setTradeLeverage(parseFloat(e.target.value)) },
                [1, 2, 5, 10].map((lv) => E("option", { key: lv, value: lv }, lv + "x"))
              )
            )
          : null,
        tradeKind === "OPTION"
          ? E("div", { className: "trade-row" },
              E("select", { value: tradeOptionType, onChange: (e) => setTradeOptionType(e.target.value) },
                E("option", { value: "CALL" }, "CALL"),
                E("option", { value: "PUT" }, "PUT")
              ),
              E("input", {
                placeholder: "STRIKE",
                value: tradeStrike,
                onChange: (e) => setTradeStrike(e.target.value)
              }),
              E("select", { value: tradeExpiryDays, onChange: (e) => setTradeExpiryDays(parseFloat(e.target.value)) },
                [7, 14, 30, 60, 90].map((d) => E("option", { key: d, value: d }, d + "D"))
              )
            )
          : null,
        E("div", { className: "trade-row" },
          E("input", { placeholder: "QTY", value: tradeQty, onChange: (e) => setTradeQty(e.target.value) }),
          E("button", { onClick: openPosition }, tradeKind === "OPTION" ? "BUY OPTION" : tradeKind === "FUTURE" ? "OPEN FUTURE" : "BUY"),
          tradeKind === "SPOT"
            ? E("button", { onClick: sellSpot, className: "trade-sell-btn" }, "SELL")
            : null
        ),
        tradeError ? E("div", { className: "trade-error" }, tradeError) : null
      );

  const positionsListEl = positionsWithValue.length === 0
    ? E("div", { className: "empty" }, "NO OPEN POSITIONS")
    : E("div", { className: "pf-list" },
        positionsWithValue.map((p) =>
          E("div", { className: "pos-row", key: p.id },
            E("div", null,
              E("span", { className: "pos-kind" }, p.kind),
              " ",
              E("span", { style: { color: "var(--cyan)" } }, p.label),
              " ",
              E("span", { style: { color: "var(--dim)", fontSize: 10 } },
                p.kind === "OPTION"
                  ? p.optionType + " " + p.strike + " x" + p.qty
                  : p.kind === "FUTURE"
                    ? p.side + " " + p.leverage + "x x" + p.qty
                    : "x" + p.qty
              )
            ),
            E("div", { className: "pos-row-bottom" },
              E("span", { className: "mono-num" }, p.value !== null ? "₹" + fmtInr(p.value) : "--"),
              p.pnlPct !== null
                ? E("span", { className: "mono-num " + (p.pnl >= 0 ? "up" : "down"), style: { marginLeft: 6 } },
                    "(" + (p.pnl >= 0 ? "+" : "") + p.pnlPct.toFixed(1) + "%)"
                  )
                : null,
              E("span", { className: "pf-rm", onClick: () => closePosition(p.id) }, p.kind === "SPOT" ? "SELL" : "CLOSE")
            )
          )
        )
      );

  const portfolioPanelEl = E("div", { className: "panel", style: { flex: "1.4 1 0" } },
    E("h2", null, "PAPER TRADING"),
    E("div", { className: "acct-summary" },
      E("div", { className: "acct-cell" }, E("div", { className: "k" }, "CASH"), E("div", { className: "v mono-num" }, "₹" + fmtInr(cashInr))),
      E("div", { className: "acct-cell" }, E("div", { className: "k" }, "POSITIONS"), E("div", { className: "v mono-num" }, "₹" + fmtInr(positionsValueTotal))),
      E("div", { className: "acct-cell" },
        E("div", { className: "k" }, "TOTAL P&L"),
        E("div", { className: "v mono-num " + (portfolioPnl >= 0 ? "up" : "down") }, (portfolioPnl >= 0 ? "+" : "") + "₹" + fmtInr(portfolioPnl))
      )
    ),
    tradeFormEl,
    E("div", { className: "india-section-label" }, "OPEN POSITIONS"),
    positionsListEl,
    E("div", { className: "sentiment-disclaimer" }, "Paper trading with virtual currency — no real trades are placed. Futures are leveraged spot; options use a simplified Black-Scholes estimate, not real market premiums.")
  );

  const sidebarEl = E("div", { className: "sidebar" }, newsPanelEl, heatmapPanelEl, portfolioPanelEl);

  const bodyEl = E("div", { className: "body" }, watchlistPanelEl, detailPanelEl, sidebarEl);

  const statusSource = tab === "crypto" ? "COINGECKO API"
    : tab === "stocks" ? "YAHOO FINANCE (VIA LOCAL PROXY)"
    : tab === "india" ? "YAHOO FINANCE (VIA LOCAL PROXY)"
    : "YAHOO FINANCE SEARCH (VIA LOCAL PROXY)";
  const statusErr = tab === "crypto" ? error : tab === "stocks" ? stocksError : tab === "india" ? indiaError : (searchQuoteError || searchError);
  const statusUpdate = tab === "crypto" ? lastUpdate : tab === "stocks" ? stocksLastUpdate : tab === "india" ? indiaLastUpdate : null;

  const statusBarEl = E("div", { className: "statusbar" },
    E("span", null,
      "DATA SOURCE: " + statusSource + " ",
      statusErr
        ? E("span", { className: "err" }, "— ERROR: " + statusErr)
        : E("span", { className: "ok" }, "— LIVE")
    ),
    E("span", null,
      "LAST UPDATE: ",
      statusUpdate ? statusUpdate.toLocaleTimeString() : "--"
    ),
    E("span", {
      onClick: onLogout,
      style: { cursor: "pointer", color: "var(--dim)", letterSpacing: "1px" },
      title: "Log out"
    }, "[ LOGOUT ]")
  );

  return E("div", { className: "terminal" },
    topbarEl,
    cmdbarEl,
    indicesBarEl,
    tickerTapeEl,
    bodyEl,
    E(MarketSummaryBar, { india, stocks, coins, global }),
    statusBarEl
  );
}

const root = createRoot(document.getElementById("root"));
root.render(E(AppWrapper, null));
</script>
</body>
</html>
